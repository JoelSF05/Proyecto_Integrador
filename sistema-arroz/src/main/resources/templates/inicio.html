<div>
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Trabajadores</h3>
            <div class="number" id="totalTrabajadores">0</div>
        </div>
        <div class="stat-card">
            <h3>Asistencias Hoy</h3>
            <div class="number" id="asistenciasHoy">0</div>
        </div>
        <div class="stat-card">
            <h3>Sacos Cosechados</h3>
            <div class="number" id="totalSacos">0</div>
        </div>
        <div class="stat-card">
            <h3>Hectáreas</h3>
            <div class="number" id="totalHectareas">3</div>
        </div>
    </div>
    
    <div style="background: white; border-radius: 10px; padding: 20px; margin-top: 20px;">
        <h3>📋 Últimas Asistencias</h3>
        <table style="width:100%; border-collapse: collapse; margin-top: 15px;">
            <thead><tr><th>Fecha</th><th>Trabajador</th><th>Entrada</th><th>Salida</th><th>Sacos</th></tr></thead>
            <tbody id="ultimasAsistencias"></tbody>
        </table>
    </div>
</div>

<script>
fetch('/api/trabajadores').then(res => res.json()).then(data => {
    document.getElementById('totalTrabajadores').innerText = data.length;
});
fetch('/api/asistencias').then(res => res.json()).then(data => {
    const totalSacos = data.reduce((sum, a) => sum + (a.sacosCosechados || 0), 0);
    document.getElementById('totalSacos').innerText = totalSacos;
    const tbody = document.getElementById('ultimasAsistencias');
    tbody.innerHTML = '';
    data.slice(-5).reverse().forEach(a => {
        const nombre = a.trabajador ? `${a.trabajador.nomTrab} ${a.trabajador.apeTrab}` : '-';
        tbody.innerHTML += `<tr><td>${a.fecAsist || '-'}</td><td>${nombre}</td><td>${a.horaEntrada || '-'}</td><td>${a.horaSalida || '-'}</td><td>${a.sacosCosechados || 0}</td></tr>`;
    });
});
</script>
