<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Agrícola de Arroz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #1a5f1a 0%, #0d3b0d 100%); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .sidebar-header h2 { font-size: 20px; }
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 12px 25px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.15); border-left-color: #ffc107; }
        .nav-icon { font-size: 22px; width: 30px; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .page-title { font-size: 24px; color: #333; }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #2e7d32; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #4CAF50; color: white; }
        button { background: #4CAF50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🌾 Sistema Arroz</h2>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="cargarPagina('inicio')"><div class="nav-icon">📊</div><div>Dashboard</div></div>
            <div class="nav-item" onclick="cargarPagina('trabajadores')"><div class="nav-icon">👥</div><div>Trabajadores</div></div>
            <div class="nav-item" onclick="cargarPagina('asistencia')"><div class="nav-icon">📋</div><div>Asistencia</div></div>
            <div class="nav-item" onclick="cargarPagina('cosechas')"><div class="nav-icon">🌾</div><div>Cosechas</div></div>
            <div class="nav-item" onclick="cargarPagina('materiales')"><div class="nav-icon">📦</div><div>Materiales</div></div>
            <div class="nav-item" onclick="cargarPagina('riego')"><div class="nav-icon">💧</div><div>Riego</div></div>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="content-area" id="contentArea"><div>Cargando...</div></div>
    </div>

    <script>
        function cargarPagina(pagina) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            fetch('/' + pagina)
                .then(res => res.text())
                .then(html => {
                    document.getElementById('contentArea').innerHTML = html;
                    const titles = { inicio:'Dashboard', trabajadores:'Trabajadores', asistencia:'Asistencia', cosechas:'Cosechas', materiales:'Materiales', riego:'Riego' };
                    document.getElementById('pageTitle').innerText = titles[pagina] || 'Dashboard';
                    if (pagina === 'asistencia') cargarScriptsAsistencia();
                })
                .catch(() => document.getElementById('contentArea').innerHTML = '<div>Error al cargar</div>');
        }
        
        function cargarScriptsAsistencia() {
            if (typeof cargarAsistencias === 'function') cargarAsistencias();
            if (typeof cargarTrabajadores === 'function') cargarTrabajadores();
        }
        
        cargarPagina('inicio');
    </script>
</body>
</html>
