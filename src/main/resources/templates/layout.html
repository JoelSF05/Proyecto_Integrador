<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroMoyobamba — Sistema Agrícola Integral</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<style>
:root {
  --v0:#071a07; --v1:#0f2d0f; --v2:#1a5c1a; --v3:#2d8b2d; --v4:rgba(45,139,45,.15);
  --d1:#c8920a; --d2:#f0b429; --d3:#fef3c7;
  --bg:#f0f4ef; --card:#ffffff; --borde:#e2e8df;
  --tx:#1a2a1a; --ts:#6b7e6b;
  --sw:272px; --th:62px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --r1: #dc2626; --b1:#2563eb; --p1:#7c3aed;
  --z-sidebar: 1000; --z-modal: 1300;
}

/* Base para accesibilidad: el escalado se aplica al raíz */
html { font-size: var(--fs-base, 100%); }

*{margin:0;padding:0;box-sizing:border-box}

/* Mejoras de Accesibilidad y Foco */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--v2);
  color: white;
  padding: 8px;
  z-index: 10000;
  transition: top 0.3s;
}
.skip-link:focus { top: 0; }

*:focus-visible {
  outline: 3px solid var(--d2);
  outline-offset: 2px;
}

body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--bg);
  color:var(--tx);
  min-height:100vh;
  display:flex;
  overflow-x:hidden;
  font-size: 1rem; /* Ahora responde al escalado de html */
  transition:background-color 0.3s, color 0.3s}

/* Modo Oscuro */
body.dark-theme {
  --bg: #070f07;
  --card: #121c12;
  --borde: #1d2b1d;
  --tx: #e6ede6;
  --ts: #9cb09c;
  --v0: #020502;
  --v1: #050a05;
  --v4: rgba(255,255,255,0.05);
  --sh: 0 4px 20px rgba(0,0,0,0.4);
  --v2: #4ade80;
  --v3: #22c55e;
  --d1: #facc15;
  --d2: #fbbf24;
  color-scheme: dark;
}

/* Ajustes específicos de visibilidad para Modo Oscuro */
body.dark-theme .plaga-card.alerta { background: rgba(220, 38, 38, 0.15); border-color: #ef4444; }
body.dark-theme .plaga-card.precaucion { background: rgba(234, 179, 8, 0.15); border-color: #facc15; }
body.dark-theme .plaga-card.ok { background: rgba(22, 163, 74, 0.15); border-color: #4ade80; }
body.dark-theme .cf-alerta { background: rgba(234, 179, 8, 0.15); border-color: #facc15; }
body.dark-theme .bv { color: #4ade80; background: rgba(74, 222, 128, 0.15); }
body.dark-theme .br { color: #f87171; background: rgba(248, 113, 113, 0.15); }
body.dark-theme .ba { color: #fbbf24; background: rgba(251, 191, 36, 0.15); }
body.dark-theme .bb { color: #60a5fa; background: rgba(96, 165, 250, 0.15); }
body.dark-theme .bp { color: #a78bfa; background: rgba(167, 139, 250, 0.15); }
body.dark-theme .notif-hdr h4 { color: var(--v2); }
body.dark-theme .notif-item:hover { background: var(--v4); }

/* Ajustes para Alerta de Materiales */
.mat-alerta { padding: 16px 18px; margin-bottom: 14px; border-left: 5px solid; box-shadow: 0 1px 6px rgba(0,0,0,.08); display: flex; flex-wrap: wrap; align-items: flex-start; gap: 12px; border-radius: 4px; }
.mat-alerta.critica { background: rgba(254,226,226,.95); border-color: #dc2626; color: #991b1b; }
.mat-alerta.baja { background: rgba(255,251,235,.95); border-color: #f59e0b; color: #713f12; }
body.dark-theme .mat-alerta.critica { background: rgba(220, 38, 38, 0.15); border-color: #ef4444; color: #fca5a5; }
body.dark-theme .mat-alerta.baja { background: rgba(234, 179, 8, 0.15); border-color: #facc15; color: #fef08a; }

/* ── LOGIN ── */
#pantalla-login{display:flex;min-height:100vh;width:100%;background:var(--v1);position:fixed;inset:0;z-index:9999;align-items:stretch}
.login-izq{flex:1;background:linear-gradient(145deg,var(--v0) 0%,var(--v2) 60%,var(--v3) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;position:relative;overflow:hidden}
.login-izq::before{content:'🌾';font-size:300px;position:absolute;opacity:.04;top:-40px;right:-60px;line-height:1}
.login-izq .marca{text-align:center;position:relative}
.login-izq .logo-grande{font-size:4rem;margin-bottom:20px;display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,.4))}
.login-izq h1{font-family:'Playfair Display',serif;font-size:2.25rem;color:#fff;margin-bottom:10px;line-height:1.2}
.login-izq .sub-marca{font-size:0.875rem;color:rgba(255,255,255,.5);font-weight:300;letter-spacing:.05em}
.login-izq .info-campo{margin-top:48px;display:flex;flex-direction:column;gap:14px}
.info-chip{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:12px 18px;border-radius:12px;color:rgba(255,255,255,.8);font-size:0.8125rem}
.info-chip span{font-size:1.375rem;flex-shrink:0}
.login-der{width:440px;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:60px 48px}
.login-der h2{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--tx);margin-bottom:6px}
.login-der .sub-login{font-size:0.8125rem;color:var(--ts);margin-bottom:36px}
.login-campo{margin-bottom:18px}
.login-campo label{display:block;font-size:0.6875rem;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.login-campo input,.login-campo select{width:100%;padding:12px 14px;border:1.5px solid var(--borde);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:0.875rem;color:var(--tx);outline:none;transition:.2s;background:var(--bg)}
.login-campo input:focus,.login-campo select:focus{border-color:var(--v3);box-shadow:0 0 0 3px rgba(45,139,45,.12);background:#fff}
.btn-login{width:100%;padding:14px;background:var(--v2);color:#fff;border:none;border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:0.9375rem;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px;letter-spacing:.02em}
.btn-login:hover{background:var(--v3);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,92,26,.35)}
.roles-demo{margin-top:28px;padding:16px;background:var(--bg);border-radius:12px;border:1px solid var(--borde)}
.roles-demo p{font-size:0.6875rem;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.role-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:0.75rem;font-weight:500;cursor:pointer;border:1.5px solid;transition:.15s;margin:3px}
.role-btn:hover{transform:translateY(-1px)}
.rb-admin{background:rgba(200,146,10,.1);border-color:var(--d1);color:var(--d1)}
.rb-super{background:rgba(37,99,235,.08);border-color:#2563eb;color:#2563eb}
.rb-ing{background:rgba(124,58,237,.08);border-color:#7c3aed;color:#7c3aed}
.rb-trab{background:rgba(45,139,45,.1);border-color:var(--v3);color:var(--v2)}
#login-error{display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px}

/* ── SIDEBAR ── */
#pantalla-app{display:none}
.sidebar{width:var(--sw);background:var(--v0);min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:var(--z-sidebar);transition:.3s}
.sidebar-logo{padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
.logo-ico{width:42px;height:42px;background:linear-gradient(135deg,var(--v3),var(--d1));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo-tx h2{font-family:'Playfair Display',serif;font-size:0.875rem;color:#fff;line-height:1.3}
.logo-tx span{font-size:0.625rem;color:rgba(255,255,255,.35);font-weight:300}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.nav-sec{padding:10px 18px 3px;font-size:0.59375rem;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.2em;text-transform:uppercase;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;transition:.2s;border-left:3px solid transparent;text-decoration:none;color:rgba(255,255,255,.58);font-size:0.8125rem;font-weight:400;margin:1px 0;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.055);color:rgba(255,255,255,.88);border-left-color:rgba(255,255,255,.15)}
.nav-item.activo{background:rgba(45,139,45,.22);color:#fff;border-left-color:var(--d2);font-weight:500}
.nav-item.activo .nbadge{background:var(--d2);color:var(--v0)}
.nav-ico{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:0.5625rem;font-weight:700;padding:2px 6px;border-radius:10px}
.role-tag{font-size:0.5625rem;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:auto;letter-spacing:.05em;text-transform:uppercase}
.rt-admin{background:rgba(200,146,10,.25);color:var(--d2)}
.rt-super{background:rgba(59,130,246,.2);color:#60a5fa}
.rt-ing{background:rgba(124,58,237,.2);color:#a78bfa}
.rt-trab{background:rgba(45,139,45,.2);color:#86efac}
.sidebar-user{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px}
.u-avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--v2),var(--d1));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8125rem;flex-shrink:0;font-weight:700;color:#fff}
.u-info{flex:1}
.u-name{font-size:0.78125rem;font-weight:600;color:#fff;display:block}
.u-rol{font-size:0.625rem;color:rgba(255,255,255,.38)}
.btn-salir{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;font-size:16px;opacity:.5;transition:all .2s;padding:6px;display:flex;align-items:center;justify-content:center;color:#fff}
.btn-salir:hover{opacity:1;background:rgba(220,38,38,0.15);border-color:rgba(220,38,38,0.4);transform:translateY(-1px)}
.btn-salir:active{transform:scale(0.92)}

/* ── APP SHELL ── */
#pantalla-app{display:none;flex:1}
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{min-height:var(--th);background:var(--card);border-bottom:1px solid var(--borde);display:flex;align-items:center;padding:8px 26px;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--borde)}
.topbar-titulo{flex:1}
.topbar-titulo h1{font-family:'Playfair Display',serif;font-size:1.3125rem;color:var(--tx)}
.breadcrumb{font-size:0.71875rem;color:var(--ts);margin-top:1px}
.topbar-acc{display:flex;align-items:center;gap:10px}
.ico-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--borde);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9375rem;transition:.2s;text-decoration:none}
.ico-btn:hover{background:var(--bg);border-color:var(--v3)}
.area{flex:1;padding:26px;overflow-y:auto}
.modulo{display:none}
.modulo.activo{display:block;animation:entrar .22s ease}

/* Botón Menú Móvil */
.menu-btn-movil{display:none;font-size:24px;background:none;border:none;color:var(--tx);cursor:pointer;padding:5px}

/* Overlay para cerrar menú en móvil */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:900;backdrop-filter:blur(2px)}

@keyframes entrar{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── COMPONENTES ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.kpi-card{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:var(--sh);border:1px solid var(--borde);display:flex;align-items:center;gap:14px;transition:.2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.kpi-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.ki-verde{background:rgba(45,139,45,.11)} .ki-dorado{background:rgba(200,146,10,.11)} .ki-azul{background:rgba(37,99,235,.1)} .ki-rojo{background:rgba(220,38,38,.09)} .ki-purp{background:rgba(124,58,237,.1)}
.kpi-num{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--tx);line-height:1;display:block}
.kpi-lbl{font-size:0.71875rem;color:var(--ts);margin-top:3px;display:block}
.kpi-var{font-size:0.65625rem;font-weight:600;margin-top:1px}

.pos{color:#16a34a} .neg{color:#dc2626}

.card{background:var(--card);border-radius:14px;box-shadow:var(--sh);border:1px solid var(--borde);margin-bottom:18px;overflow:visible}
.card-hdr{padding:16px 20px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.card-hdr h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--tx)}
.card-hdr .sub{font-size:0.78125rem;color:var(--ts)}
.tabla-wrap{overflow-x:auto;overflow-y:visible}
table{width:100%;border-collapse:collapse}
thead th{background:var(--bg);padding:10px 14px;text-align:left;font-size:0.65625rem;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--borde);white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid rgba(226,232,223,.5);font-size:0.84375rem;color:var(--tx)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(45,139,45,.025)}
.c-nombre{display:flex;align-items:center;gap:9px}
.mini-av{width:29px;height:29px;border-radius:50%;background:linear-gradient(135deg,var(--v2),var(--v3));display:flex;align-items:center;justify-content:center;font-size:0.6875rem;color:#fff;font-weight:700;flex-shrink:0}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:0.71875rem;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.bv{background:rgba(22,163,74,.09);color:#16a34a}.bv::before{background:#16a34a}
.br{background:rgba(220,38,38,.09);color:#dc2626}.br::before{background:#dc2626}
.ba{background:rgba(234,179,8,.1);color:#a16207}.ba::before{background:#ca8a04}
.bb{background:rgba(37,99,235,.09);color:#2563eb}.bb::before{background:#3b82f6}
.bg{background:rgba(107,114,128,.09);color:#6b7280}.bg::before{background:#9ca3af}
.bp{background:rgba(124,58,237,.09);color:#7c3aed}.bp::before{background:#7c3aed}

.tbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--borde);background:var(--card);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'IBM Plex Sans',sans-serif;color:var(--tx);box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)}
.tbtn:hover{background:var(--bg);border-color:var(--v3);color:var(--v2);transform: translateY(-1px);box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1)}
.tbtn:active{transform: scale(0.96)}
.tbtn.peligro:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.tbtn.success:hover{background:#f0fdf4;border-color:#86efac;color:#16a34a}

.btn-p{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:linear-gradient(135deg, var(--v2), var(--v3));color:#fff;border:none;border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(0.4, 0, 0.2, 1);box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 10px 15px -3px rgba(26,92,26,0.3);filter:brightness(1.1)}
.btn-p:active{transform:translateY(0) scale(0.97)}

.btn-s{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--card);color:var(--tx);border:1.5px solid var(--borde);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;transition:all .2s;box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05)}
.btn-s:hover{background:#f8faf8;border-color:var(--v3);color:var(--v2);box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05)}
.btn-s:active{transform: scale(0.98)}

.btn-d{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(200,146,10,.12);color:var(--d1);border:1.5px solid var(--d1);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-d:hover{background:rgba(200,146,10,.22)}
.btn-b{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(37,99,235,.1);color:#2563eb;border:1.5px solid #2563eb;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-b:hover{background:rgba(37,99,235,.2)}
.btn-pu{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(124,58,237,.1);color:#7c3aed;border:1.5px solid #7c3aed;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-pu:hover{background:rgba(124,58,237,.2)}

.busq{position:relative}
.busq-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.busq input{padding:7px 11px 7px 30px;border:1px solid var(--borde);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:0.78125rem;color:var(--tx);background:var(--bg);outline:none;width:200px;transition:.2s}
.busq input:focus{background:var(--card);border-color:var(--v3);box-shadow:0 0 0 3px rgba(45,139,45,.1);width:240px}
.htools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* Estilo Badge Rol (Movido de inline a clase para soportar escalado rem) */
#topbar-rol-badge {
  font-size: 0.6875rem; font-weight: 700; padding: 4px 10px; border-radius: 20px;
  background: rgba(45,139,45,0.12); color: var(--v2);
}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(7,26,7,.55);backdrop-filter:blur(3px);z-index:1300;align-items:center;justify-content:center}
.modal-ov.vis{display:flex}
.modal{background:var(--card);border-radius:16px;padding:26px;width:90%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mEnt .22s ease;position:relative;z-index:1301}
.modal.lg{max-width:850px}
@keyframes mEnt{from{opacity:0;transform:scale(.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-tit{font-family:'Playfair Display',serif;font-size:1.1875rem;margin-bottom:18px;color:var(--tx)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.form-grid .full{grid-column:1/-1}
.fc label{display:block;font-size:0.65625rem;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.fc input,.fc select,.fc textarea{width:100%;padding:9px 11px;border:1.5px solid var(--borde);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:0.84375rem;color:var(--tx);outline:none;transition:.2s;background:var(--card)}
.fc input:focus,.fc select:focus,.fc textarea:focus{border-color:var(--v3);box-shadow:0 0 0 3px rgba(45,139,45,.1)}
.fc textarea{resize:vertical;min-height:80px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:4px;padding-top:16px;border-top:1px solid var(--borde)}

/* Panel de Notificaciones */
.notif-pop { display: none; position: fixed; background: var(--card); border: 1px solid var(--borde); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.15); z-index: 1200; width: 320px; max-height: 450px; overflow-y: auto; }
.notif-pop.open { display: block; }
.notif-hdr { padding: 14px 18px; border-bottom: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-radius: 12px 12px 0 0; }
.notif-hdr h4 { font-size: 0.875rem; font-weight: 700; color: var(--v1); }
.notif-item { padding: 12px 18px; border-bottom: 1px solid var(--borde); display: flex; gap: 12px; cursor: pointer; transition: .15s; }
.notif-item:hover { background: rgba(45,139,45,.03); }
.notif-item:last-child { border-bottom: none; }
.notif-ico { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.notif-cont { flex: 1; }
.notif-tit { font-size: 0.8125rem; font-weight: 600; color: var(--tx); margin-bottom: 2px; }
.notif-txt { font-size: 0.71875rem; color: var(--ts); line-height: 1.4; }
.notif-tag { font-size: 0.5625rem; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-top: 5px; display: inline-block; }
.notif-empty { padding: 40px 20px; text-align: center; color: var(--ts); }

/* Panel de Ajustes */
.settings-pop { display: none; position: fixed; background: var(--card); border: 1px solid var(--borde); border-radius: 12px; box-shadow: var(--sh); z-index: 1200; width: 240px; padding: 15px; }
.settings-pop.open { display: block; }
.setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.setting-item:last-child { margin-bottom: 0; }
.setting-item span { font-size: 0.8125rem; font-weight: 500; color: var(--tx); }
.font-ctrls { display: flex; align-items: center; gap: 8px; }

/* Toggle Switch */
.switch { position: relative; display: inline-block; width: 34px; height: 18px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 18px; }
.slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: var(--v2); }
input:checked + .slider:before { transform: translateX(16px); }

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--v0);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;display:none;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tEnt .3s ease}
@keyframes tEnt{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.vis{display:flex}

/* ── Menú de acciones 3 puntos ── */
.acc-wrap{position:relative;display:inline-flex;overflow:visible}
.acc-wrap.open-wrap{z-index:1100}
.acc-btn{background:none;border:1.5px solid var(--borde);border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--ts);display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1}
.acc-btn:hover{background:var(--bg);border-color:var(--v3);color:var(--v2)}
.acc-menu{display:none;position:fixed;background:var(--card);border:1px solid var(--borde);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:1200;min-width:150px;overflow:hidden}
.acc-menu.open{display:block}
.acc-menu a{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:0.8125rem;color:var(--tx);cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:'IBM Plex Sans',sans-serif}
.acc-menu a:hover{background:var(--bg)}
.acc-menu a.rojo{color:#dc2626}
.acc-menu a.rojo:hover{background:#fef2f2}
.acc-sep{height:1px;background:var(--borde);margin:3px 0}

/* Barra herramientas de filtro*/
input[type="date"],input[type="time"]{padding:10px 12px;border:1.5px solid var(--borde);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:0.875rem;outline:none;background:var(--bg);color:var(--tx);min-height:42px;width:auto;transition:.2s;cursor:text}
input[type="date"]:focus,input[type="time"]:focus{border-color:var(--v3);background:var(--card);box-shadow:0 0 0 3px rgba(45,139,45,.1)}

/* Estilo para que el selector de hora se sienta como un campo de texto */
input[type="time"]::-webkit-calendar-picker-indicator {
  cursor: pointer;
  filter: invert(30%) sepia(50%) saturate(500%) hue-rotate(80deg);
}

select.filtro{padding:7px 10px;border:1px solid var(--borde);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:0.78125rem;outline:none;background:var(--bg);color:var(--tx)}

/* Pago calculado */
.pago-display{background:linear-gradient(135deg,rgba(45,139,45,.08),rgba(200,146,10,.06));border:2px solid rgba(45,139,45,.2);border-radius:12px;padding:16px 20px;text-align:center;margin:16px 0}
.pago-display .pago-num{font-family:'Playfair Display',serif;font-size:36px;color:var(--v2);font-weight:700}
.pago-display .pago-lbl{font-size:12px;color:var(--ts);display:block;margin-top:2px}

/* Tarea cards trabajador */
.tareas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:20px}
.tarea-card{border:2px solid var(--borde);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg)}
.tarea-card:hover{border-color:var(--v3);background:rgba(45,139,45,.04);transform:translateY(-2px)}
.tarea-card.sel{border-color:var(--v3);background:rgba(45,139,45,.1);box-shadow:0 0 0 3px rgba(45,139,45,.15)}
.tarea-card .t-ico{font-size:32px;margin-bottom:8px}
.tarea-card .t-nom{font-size:0.8125rem;font-weight:600;color:var(--tx)}
.tarea-card .t-pay{font-size:0.71875rem;color:var(--ts);margin-top:3px}

/* Reportes */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:20px}
.rep-item{border:1.5px solid var(--borde);border-radius:12px;padding:20px;cursor:pointer;transition:.2s;background:var(--bg)}
.rep-item:hover{border-color:var(--v3);background:rgba(45,139,45,.04);transform:translateY(-2px);box-shadow:var(--sh)}
.rep-item .r-ico{font-size:26px;margin-bottom:10px}
.rep-item h4{font-size:0.875rem;font-weight:600;color:var(--tx);margin-bottom:3px}
.rep-item p{font-size:0.75rem;color:var(--ts)}
.rep-item .r-tag{display:inline-block;margin-top:8px;font-size:0.625rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(45,139,45,.1);color:var(--v2)}

/* Chart barras */
.chart-wrap{display:flex;flex-direction:column;gap:9px;padding:14px 20px}
.ch-fila{display:flex;align-items:center;gap:11px;font-size:0.78125rem}
.ch-lbl{width:120px;color:var(--ts);font-size:0.75rem}
.ch-bar-bg{flex:1;height:9px;background:var(--bg);border-radius:5px;overflow:hidden}
.ch-bar{height:100%;border-radius:5px;transition:width 1.2s ease}
.ch-val{width:60px;text-align:right;font-weight:600;color:var(--tx);font-size:0.8125rem}

/* Tareas supervisor */
.task-verify{display:grid;grid-template-columns:1fr;gap:10px;padding:18px}
.tv-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--borde);border-radius:10px;background:var(--bg);transition:.2s}
.tv-row:hover{border-color:var(--v3);background:var(--card)}
.tv-info{flex:1}
.tv-name{font-weight:600;font-size:0.875rem}
.tv-tarea{font-size:0.75rem;color:var(--ts);margin-top:2px}
.tv-pago{font-family:'Playfair Display',serif;font-size:1rem;color:var(--v2);margin-right:10px;white-space:nowrap}
.tv-acc{display:flex;gap:6px}

/* Plagas ingeniero */
.plaga-card{border:1.5px solid var(--borde);border-radius:12px;padding:16px;margin-bottom:12px;background:var(--card)}
.plaga-card.alerta{border-color:#dc2626;background:#fef2f2}
.plaga-card.precaucion{border-color:#ca8a04;background:#fefce8}
.plaga-card.ok{border-color:#16a34a;background:#f0fdf4}
.plaga-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.plaga-hdr h4{font-size:0.875rem;font-weight:600;flex:1}
.plaga-desc{font-size:0.78125rem;color:var(--ts);line-height:1.6}
.plaga-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.plaga-chip{font-size:0.6875rem;padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--borde);color:var(--ts)}

/* Infocampo - secciones produccion */
.info-section{padding:24px}
.info-section h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--tx);margin-bottom:6px}
.info-section .lugar{font-size:0.8125rem;color:var(--ts);display:flex;align-items:center;gap:6px;margin-bottom:20px}
.info-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.info-bloque{background:var(--bg);border:1px solid var(--borde);border-radius:12px;padding:18px}
.info-bloque h4{font-size:0.875rem;font-weight:700;color:var(--v2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-bloque p,.info-bloque li{font-size:0.8125rem;color:var(--tx);line-height:1.7}
.info-bloque ul{padding-left:16px}
.dato-fila{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--borde);font-size:0.8125rem}
.dato-fila:last-child{border:none}
.dato-fila .val{font-weight:700;color:var(--v2)}
.proceso-steps{display:flex;flex-direction:column;gap:10px}
.paso{display:flex;gap:12px;align-items:flex-start}
.paso-num{width:26px;height:26px;border-radius:50%;background:var(--v2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;margin-top:1px}
.paso-info h5{font-size:0.8125rem;font-weight:600;color:var(--tx)}
.paso-info p{font-size:0.75rem;color:var(--ts);line-height:1.6}

/* Caja admin */
.caja-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(226,232,223,.5);font-size:0.84375rem}
.caja-row:last-child{border-bottom:none}
.caja-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.caja-desc{flex:1}
.caja-desc strong{display:block;font-size:0.84375rem;font-weight:600}
.caja-desc span{font-size:0.71875rem;color:var(--ts)}
.caja-monto{font-family:'Playfair Display',serif;font-size:0.9375rem;font-weight:700}
.caja-monto.ing{color:#16a34a}
.caja-monto.eg{color:#dc2626}

/* Ficosanitario */
.cal-fitosanit{display:flex;flex-direction:column;gap:8px;padding:16px 20px}
.cf-item{display:flex;gap:14px;padding:12px;border-radius:10px;border:1px solid var(--borde);background:var(--bg)}
.cf-mes{width:70px;flex-shrink:0}
.cf-mes .m-name{font-size:0.75rem;font-weight:700;color:var(--v2);text-transform:uppercase}
.cf-mes .m-etapa{font-size:0.65625rem;color:var(--ts)}
.cf-contenido{flex:1}
.cf-contenido h5{font-size:0.8125rem;font-weight:600;color:var(--tx);margin-bottom:3px}
.cf-contenido p{font-size:0.75rem;color:var(--ts);line-height:1.6}
.cf-alerta{background:#fefce8;border-color:#ca8a04}

/* Reporte modal content */
.rep-contenido table{font-size:12px}
.rep-total{background:rgba(45,139,45,.06);border-top:2px solid var(--v3)}
.rep-total td{font-weight:700;color:var(--v2);font-size:13px}

/* Admin-only indicator */
.solo-admin{position:relative}
.solo-admin::after{content:'🔐 Solo Admin';position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:rgba(200,146,10,.9);color:#fff;font-size:0.625rem;padding:3px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s}
.solo-admin:hover::after{opacity:1}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%); width: 280px;}
  .sidebar.abierta{transform:translateX(0)}
  .sidebar-overlay.vis{display:block}
  .main-wrap{margin-left:0}
  .login-izq{display:none}
  .login-der{width:100%}
  
  .menu-btn-movil{display:block}
  .topbar{padding:8px 15px; height: auto; min-height: auto;}
  .topbar-titulo{flex: 1; min-width: 0;}
  .topbar-titulo h1{font-size:15px; line-height: 1.2; word-break: break-word; margin-right: 5px;}
  .breadcrumb{display:none}
  .topbar-acc{gap: 6px;}
  #topbar-rol-badge{display:none}
  
  .kpi-grid{grid-template-columns: 1fr !important; gap: 10px !important}
  .form-grid{grid-template-columns: 1fr !important}
  .info-cols{display: flex !important; flex-direction: column !important; gap: 15px !important}
  .htools{flex-direction: column; align-items: stretch !important}
  .area{padding:15px}
  .busq input{width:100% !important}
  .card-hdr{flex-direction: column !important; align-items: stretch !important; gap: 12px}

  /* Verificar Tareas Responsivo: Evita pérdida de contenido */
  .tv-row{flex-direction: column; align-items: stretch; gap: 12px; padding: 16px; text-align: left}
  .tv-row > .badge{order: 1; align-self: flex-start; margin-bottom: 5px}
  .tv-info{order: 2; border-bottom: 1px solid var(--borde); padding-bottom: 10px; width: 100%}
  .tv-pago{order: 3; text-align: right; margin: 5px 0; font-size: 20px}
  .tv-acc{order: 4; width: 100%; flex-wrap: wrap; justify-content: stretch; gap: 8px}
  .tv-acc .tbtn{flex: 1; min-width: 110px; padding: 10px; justify-content: center}

  /* Ajuste para celdas de acción en tablas para evitar desbordes */
  tbody td[data-label="Acción"], tbody td[data-label="Acciones"] {
    text-align: left !important;
    padding-left: 15px !important;
    padding-top: 38px !important;
  }
  tbody td[data-label="Acción"]::before, tbody td[data-label="Acciones"]::before {
    top: 12px !important;
    width: 90% !important;
  }
  
  /* Tablas responsivas en móvil */
  .tabla-wrap{border:0}
  thead{display:none}
  tbody tr{display:block; margin-bottom: 25px; border: 1px solid var(--borde); border-radius: 12px; background: var(--card); box-shadow: var(--sh); overflow: hidden; position: relative;}
  tbody tr:last-child{margin-bottom: 0}
  tbody tr::after{content: ""; display: block; height: 4px; background: var(--v3); opacity: 0.2;}
  tbody td{display:block;text-align:right;padding-left:50%;position:relative;border-bottom:1px solid var(--borde)}
  tbody td:last-child{border-bottom: 0}
  tbody td::before{content:attr(data-label);position:absolute;left:15px;top: 12px;width:40%;text-align:left;font-weight:700;font-size:0.625rem;color:var(--ts);text-transform:uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
}

@media(max-width:480px){
  .busq input{width:100% !important}
}

<div id="pantalla-app" style="display:none;width:100%">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<script>
// Lógica de interfaz responsive
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const btn = document.getElementById('btn-movil');
  sb.classList.toggle('abierta');
  ov.classList.toggle('vis');
  if(btn) btn.setAttribute('aria-expanded', sb.classList.contains('abierta'));
}

// ═══════════════════════════════════════════════════════
// DATOS & ESTADO
// ═══════════════════════════════════════════════════════
const TARIFAS = {
  TRANSPLANTE:  {tipo:'fijo',  monto:50,   unidad:'tarea',   ico:''},
  SACA:         {tipo:'fijo',  monto:50,   unidad:'tarea',   ico:''},
  CARGA:        {tipo:'fijo',  monto:50,   unidad:'tarea',   ico:''},
  DIA:          {tipo:'fijo',  monto:50,   unidad:'día',     ico:''},
  FUMIGACION:   {tipo:'cantidad',monto:50, unidad:'cilindro', ico:''},
  ABONO:        {tipo:'cantidad',monto:6.5,unidad:'saco',     ico:''},
};

let SESSION = { rol: 'ADMIN', nombre: 'Cargando...', avatar: 'U' };
let modActivo = '';

// ── Helpers de permisos ──
const isAdmin = () => SESSION.rol === 'ADMIN';
const btnAdmin = (html) => isAdmin() ? html : '';

// ── Menú 3 puntos ──
function toggleMenu(btn) {
  const menu = btn.nextElementSibling;
  const wrap = btn.parentElement;
  // Cierra todos los demás menús abiertos
  document.querySelectorAll('.acc-menu.open').forEach(m => { 
    if(m !== menu) {
      m.classList.remove('open');
      m.parentElement.classList.remove('open-wrap');
    }
  });
  
  const opening = !menu.classList.contains('open');
  menu.classList.toggle('open', opening);
  wrap.classList.toggle('open-wrap', opening);

  if (!opening) { menu.style.left = ''; menu.style.top = ''; return; }
  menu.classList.add('open');
  positionAccMenu(menu, btn);
}

function positionAccMenu(menu, btn) {
  menu.style.visibility = 'hidden';
  menu.style.left = '0';
  menu.style.top = '0';
  const btnRect = btn.getBoundingClientRect();
  const menuRect = menu.getBoundingClientRect();
  const padding = 8;
  let left = btnRect.right - menuRect.width;
  if (left < padding) left = padding;
  if (left + menuRect.width > window.innerWidth - padding) left = window.innerWidth - menuRect.width - padding;
  let top = btnRect.bottom + 6;
  if (top + menuRect.height > window.innerHeight - padding) {
    top = btnRect.top - menuRect.height - 6;
    if (top < padding) top = padding;
  }
  menu.style.left = `${left}px`;
  menu.style.top = `${top}px`;
  menu.style.visibility = '';
}
// Clic fuera cierra todos los menús

// ── Lógica de Notificaciones ──
function toggleNotif(btn) {
  const pop = document.getElementById('notif-pop');
  const wrap = btn.parentElement;
  const isOpening = !pop.classList.contains('open');

  document.querySelectorAll('.acc-menu.open, .notif-pop.open').forEach(m => {
    if(m !== pop) { m.classList.remove('open'); m.parentElement.classList.remove('open-wrap'); }
  });

  if (isOpening) {
    renderNotifContent();
    pop.classList.add('open');
    wrap.classList.add('open-wrap');
    positionAccMenu(pop, btn);
  } else {
    pop.classList.remove('open');
    wrap.classList.remove('open-wrap');
  }
}

function renderNotifContent() {
  const pop = document.getElementById('notif-pop');
  const criticalPlagas = plagas.filter(p => p.nivel === 'ALTO');
  const lowStock = materiales.filter(m => m.stockActual <= m.stockMinimo);
  let items = [];

  criticalPlagas.forEach(p => items.push({ ico: '🦠', tit: `Alerta: ${p.nombre}`, txt: `Nivel crítico en parcela ${p.parcela}. Usar: ${p.producto}`, tag: 'Plaga', cls: 'br', mod: 'control-plagas' }));
  lowStock.forEach(m => items.push({ ico: '📦', tit: `Stock Bajo: ${m.nombre}`, txt: `Solo quedan ${m.stockActual} ${m.unidad}. Mínimo: ${m.stockMinimo}`, tag: 'Insumo', cls: 'ba', mod: 'materiales' }));
  
  // Recomendación específica si hay Pyricularia
  if (plagas.some(p => p.nombre.includes('Pyricularia') && p.nivel === 'ALTO')) {
    items.push({ ico: '🧪', tit: 'Recomendación Urgente', txt: 'Aplicar preventivo en parcelas colindantes a la Parcela A.', tag: 'Sanitario', cls: 'bp', mod: 'recomendaciones' });
  }

  if (!items.length) {
    pop.innerHTML = `<div class="notif-hdr"><h4>Notificaciones</h4></div><div class="notif-empty"><div style="font-size:30px">✅</div><p>Todo en orden. No hay alertas críticas.</p></div>`;
    return;
  }

  pop.innerHTML = `
    <div class="notif-hdr"><h4>Alertas Críticas (${items.length})</h4></div>
    ${items.map(it => `
      <div class="notif-item" onclick="irAModuloNotif('${it.mod}')">
        <div class="notif-ico">${it.ico}</div>
        <div class="notif-cont">
          <div class="notif-tit">${it.tit}</div>
          <div class="notif-txt">${it.txt}</div>
          <span class="notif-tag badge ${it.cls}">${it.tag}</span>
        </div>
      </div>
    `).join('')}
  `;
}

}

function toggleDarkMode(isDark) {
  document.body.classList.toggle('dark-theme', isDark);
  localStorage.setItem('agro_theme', isDark ? 'dark' : 'light');
}

function changeFontSize(delta) {
  const current = parseInt(localStorage.getItem('agro_fs') || '100');
  let next = current + delta;
  if (next < 80) next = 80;
  if (next > 130) next = 130; // Límite para no romper el layout
  
  applyFontSize(next);
  localStorage.setItem('agro_fs', next);
}

function applyFontSize(val) {
  document.documentElement.style.setProperty('--fs-base', val + '%');
  const valDisplay = document.getElementById('font-size-val');
  if(valDisplay) valDisplay.textContent = val + '%';
}

function initAccessibility() {
  const savedTheme = localStorage.getItem('agro_theme');
  const savedFs = localStorage.getItem('agro_fs') || '100';
  if (savedTheme === 'dark') { document.body.classList.add('dark-theme'); document.getElementById('dark-mode-check').checked = true; }
  applyFontSize(parseInt(savedFs));
}

function updateNotifBadge() {
  let count = plagas.filter(p => p.nivel === 'ALTO').length + materiales.filter(m => m.stockActual <= m.stockMinimo).length;

  // Sumar 1 si existe la recomendación de Pyricularia para que coincida con el contenido del popup
  if (plagas.some(p => p.nombre.includes('Pyricularia') && p.nivel === 'ALTO')) {
    count++;
  }

  const badge = document.getElementById('notif-count');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }
  // Refrescar también el KPI de alertas del dashboard si estamos ahí
  const kpi = document.getElementById('kpi-alertas');
  if(kpi) kpi.textContent = count;
}

let movCaja = [];
let materiales = [];

async function cargarMateriales() {
  const cont = document.getElementById('materiales-contenedor');
  if (cont) cont.innerHTML = '<p style="color:var(--ts)">Cargando materiales...</p>';
  const datos = await apiFetch('/api/materiales');
  materiales = Array.isArray(datos) ? datos.map(m => ({
    id: m.idMat,
    nombre: m.nomMat,
    tipo: m.tipoMat,
    stockActual: parseFloat(m.stockActual || 0),
    stockMinimo: parseFloat(m.stockMinimo || 0),
    unidad: m.unidadMedida || 'unidad'
  })) : [];
  renderMateriales(document.getElementById('mat-search')?.value || '');
  updateNotifBadge();
}

function renderMateriales(filtro = '') {
  const cont = document.getElementById('materiales-contenedor');
  if (!cont) return;
  const query = (filtro || '').toString().trim().toLowerCase();
  const lista = materiales.filter(m =>
    m.nombre.toLowerCase().includes(query) ||
    (m.tipo || '').toLowerCase().includes(query)
  );
  if (!lista.length) {
    cont.innerHTML = '<p style="color:var(--ts)">No se encontraron materiales para la búsqueda.</p>';
    return;
  }
  const bajos = lista.filter(m => m.stockActual <= m.stockMinimo);
  const agotado = bajos.some(m => m.stockActual <= 0);
  
  const advertencia = bajos.length > 0 ? `
    <div class="mat-alerta ${agotado ? 'critica' : 'baja'}">
      <div style="font-size:20px;line-height:1.1">⚠️</div>
      <div>
        <div style="font-weight:700;margin-bottom:4px">${agotado ? 'Material(es) agotado(s)' : 'Stock bajo detectado'}</div>
        <div style="font-size:0.8125rem;line-height:1.6">${bajos.length} material${bajos.length===1?'':'es'} con stock bajo o crítico. ${agotado ? 'Incluye al menos un material agotado.' : 'Revise los niveles antes de usar.'}</div>
      </div>
    </div>
  ` : '';
  cont.innerHTML = `${advertencia} <div class="tabla-wrap"><table>
      <thead><tr><th>Material</th><th>Categoría</th><th>Stock</th><th>Unidad</th><th>Nivel</th><th>Acción</th></tr></thead>
      <tbody>
        ${lista.map(m => {
          const nivel = m.stockActual <= m.stockMinimo
            ? '<span class="badge br">Stock Bajo</span>'
            : '<span class="badge bv">Suficiente</span>';
          const color = m.stockActual <= m.stockMinimo ? '#ca8a04' : 'var(--v2)';
          return `
            <tr>
              <td data-label="Material"><div class="c-nombre"><strong>${m.nombre}</strong></div></td>
              <td data-label="Categoría">${m.tipo || 'Sin categoría'}</td>
              <td data-label="Stock" style="font-weight:700;color:${color}">${m.stockActual.toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:2})}</td>
              <td data-label="Unidad">${m.unidad}</td>
              <td data-label="Nivel">${nivel}</td>
              <td data-label="Acción">
                <div class="htools" style="gap: 6px; justify-content: flex-end;">
                  <input id="mat-cant-${m.id}" type="number" min="1" value="1" style="width:70px;padding:6px;border:1px solid var(--borde);border-radius:8px;" />
                  <div style="display:flex; gap:4px">
                    <button class="btn-s" onclick="usarMaterial(${m.id})">Usar</button>
                    <button class="btn-p" onclick="agregarMaterial(${m.id})">Agregar</button>
                  </div>
                </div>
              </td>
            </tr>`;
        }).join('')}</tbody></table></div>`;
}

async function guardarNuevoMaterial(event){
  event.preventDefault();
  const body = {
    nomMat: document.getElementById('mat-nombre').value.trim(),
    tipoMat: document.getElementById('mat-categoria').value.trim(),
    stockActual: parseFloat(document.getElementById('mat-stock').value) || 0,
    stockMinimo: parseFloat(document.getElementById('mat-stockmin').value) || 0,
    unidadMedida: document.getElementById('mat-unidad').value.trim() || 'unidad'
  };
  try {
    const r = await fetch('/api/materiales', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if(r.ok){
      mostrarToast('Material creado con éxito');
      cerrarModal();
      await cargarMateriales();
    } else {
      const texto = await r.text();
      mostrarToast('No se pudo crear material: ' + texto);
    }
  } catch(e){
    mostrarToast('Error al crear material');
  }
}

function buscarMateriales() {
  const filtro = document.getElementById('mat-search')?.value || '';
  renderMateriales(filtro);
}

async function usarMaterial(id) {
  const mat = materiales.find(x => x.id === id);
  if (!mat) return mostrarToast('Material no encontrado');

  const cantSugerida = document.getElementById(`mat-cant-${id}`)?.value || 1;

  abrirModal(`
    <h3 class="modal-tit">Registrar Uso de Material: ${mat.nombre}</h3>
    <div class="form-grid">
      <div class="fc"><label>Fecha de Aplicación</label><input type="date" id="uso-fecha" value="${new Date().toLocaleDateString('en-CA')}"></div>
      <div class="fc"><label>Hora</label><input type="time" id="uso-hora" value="${new Date().toTimeString().slice(0,5)}"></div>
      <div class="fc full"><label>Parcela / Hectárea Destino</label>
        <select id="uso-hect">
          <option value="1">Lote A – Zona Norte</option>
          <option value="2">Lote B – Zona Sur</option>
          <option value="3">Lote C – Zona Este</option>
        </select>
      </div>
      <div class="fc"><label>Cantidad (${mat.unidad})</label>
        <input type="number" id="uso-cant" value="${cantSugerida}" min="0.01" step="0.01">
      </div>
      <div class="fc full"><label>Detalle / Observación del Uso</label>
        <textarea id="uso-detalle" rows="2" placeholder="Ej: Control preventivo de plagas..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-s" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-p" onclick="guardarUsoMaterial(${id})">Confirmar y Descontar</button>
    </div>
  `);
}
async function guardarUsoMaterial(idMat) {
  const idHect   = parseInt(document.getElementById('uso-hect').value);
  const fecha    = document.getElementById('uso-fecha').value;
  const hora     = document.getElementById('uso-hora').value;
  const cantidad = parseFloat(document.getElementById('uso-cant').value);
  const detalle  = document.getElementById('uso-detalle').value;

  if (!cantidad || cantidad <= 0) return mostrarToast('Ingrese una cantidad válida');
  const mat = materiales.find(m => m.id === idMat);
  if (cantidad > mat.stockActual) return mostrarToast('Error: Stock insuficiente');

  const body = { 
    idMat, 
    idHect, 
    fecUso: fecha, 
    horaUso: hora + ":00", 
    cantidad, 
    detalleUso: detalle 
  };

  try {
    const r = await fetch('/api/materiales/uso', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (r.ok) {
      mostrarToast('Uso registrado en BD y stock actualizado');
      cerrarModal();
      await cargarMateriales(); // Refresca la tabla y las alertas de stock bajo
    } else {
      const err = await r.text();
      mostrarToast('Error al procesar: ' + err);
    }
  } catch(e) {
    mostrarToast('Fallo en la comunicación con el servidor');
  }
}

async function agregarMaterial(id) {
  const input = document.getElementById(`mat-cant-${id}`);
  let cantidad = Number(input?.value || 1);
  if (!cantidad || cantidad < 1) cantidad = 1;
  const mat = materiales.find(x => x.id === id);
  if (!mat) return mostrarToast('Material no encontrado');
  const nuevoStock = mat.stockActual + cantidad;
  const res = await apiFetch(`/api/materiales/${id}/stock`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ nuevoStock, observacion: `Ingreso de material (+${cantidad})` })
  });
  if (res) {
    mat.stockActual = parseFloat(res.stockActual || nuevoStock);
    mostrarToast(`Se agregaron ${cantidad} ${mat.unidad} a ${mat.nombre}`);
    renderMateriales(document.getElementById('mat-search')?.value || '');
    updateNotifBadge();
  }
}

// ── Utilidad para llamar a la API ──
async function apiFetch(url, options={}) {
  try {
    const r = await fetch(url, options);
    if (r.status === 401) { logout(); return null; }
    if (!r.ok) {
      const body = await r.text();
      mostrarToast('Error en servidor: ' + r.status + ' ' + body);
      return null;
    }
    return await r.json();
  } catch(e) {
    mostrarToast('Sin conexión con el servidor');
    return null;
  }
}

// ── Cargar datos reales de BD al iniciar ──
async function cargarDatosIniciales() {
  const [trabs, asists] = await Promise.all([
    apiFetch('/api/trabajadores'),
    apiFetch('/api/asistencias')
  ]);
  if (trabs)  trabajadores = trabs.map(t => ({
    id:          t.idTrab,
    nombre:      t.nomTrab,
    apellido:    t.apeTrab,
    dni:         t.dniTrab,
    cargo:       t.cargoNombre || 'Sin cargo',
    cargoId:     t.cargoId,
    tipoPago:    t.tipoPago,
    sueldoDia:   t.sueldoDia,
    sueldoDia:   t.sueldoBaseDia,
    pagoPorSaco: t.pagoPorSaco,
    pagoPorTarea:t.pagoPorTarea,
    activo:      true,
    qrToken:     t.qrToken
  }));
  if (asists) asistencias = asists
    .filter(a => a.trabajador && a.trabajador.activo)
    .map(a => ({
      id:          a.idAsist,
      trabId:      a.trabajador?.idTrab,
      fecAsist:    a.fecAsist,
      fecha:       a.fecAsist,
      tipoTarea:   a.tipoTarea || 'DIA',
      presente:    a.presente,
      estado:      a.estadoAprobacion || 'PENDIENTE',
      hour:        a.horaEntrada || '06:00',
      sacos:       a.sacosCosechados,
      tareasCompletadas: a.tareasCompletadas || 0,
      observacion: a.observacionSupervisor || ''
    }));
  // Aplicar overrides locales (persistencia offline: aprobaciones/observaciones/eliminaciones)
  applyAsistOverrides();
  // Cargar incidencias desde servidor si existe endpoint
  await cargarIncidencias();
}


// ----------------------- Persistencia local de cambios en asistencias -----------------------
function _loadAsistOverrides(){
  try{ return JSON.parse(localStorage.getItem('asi_over')||'{}'); }catch(e){ return {}; }
}
function _saveAsistOverrides(m){
  try{ localStorage.setItem('asi_over', JSON.stringify(m)); }catch(e){ console.warn('No se pudo guardar overrides', e); }
}
function saveAsistOverride(id, obj){
  const m = _loadAsistOverrides();
  m[id] = Object.assign({}, m[id]||{}, obj);
  _saveAsistOverrides(m);
}
function removeAsistOverride(id){
  const m = _loadAsistOverrides();
  if(m.hasOwnProperty(id)) { delete m[id]; _saveAsistOverrides(m); }
}
function applyAsistOverrides(){
  const m = _loadAsistOverrides();
  if(!asistencias || !Array.isArray(asistencias)) return;
  // Aplicar a la lista actual
  Object.keys(m).forEach(k => {
    const id = Number(k);
    const ov = m[k];
    const ix = asistencias.findIndex(x => x.id === id);
    if(ov.deleted){
      if(ix !== -1) asistencias.splice(ix,1);
    } else if(ix !== -1){
      asistencias[ix] = Object.assign({}, asistencias[ix], ov);
    } else {
      // Si no existe localmente, ignorar
    }
  });
}

    {sec:'Producción Arrocera', items:[
      {id:'transplante',ico:'🌱',label:'Transplante'},
      {id:'saca-arroz',ico:'🌾',label:'Saca de Arroz'},
      {id:'carga-arroz',ico:'📦',label:'Carga de Arroz'},
      {id:'movilidad',ico:'⛽',label:'Gasolina'},
    ]},
    {sec:'Campo', items:[
      {id:'riego',ico:'💧',label:'Riego'},
      {id:'materiales',ico:'📦',label:'Materiales'},
    ]},
  ];

  // Filtro por rol
  const PERMISOS = {
    TRABAJADOR: ['mi-asistencia'],
    SUPERVISOR: ['dashboard','verificar-tareas','incidencias','resumen-diario','riego','materiales','transplante','saca-arroz','carga-arroz','movilidad'],
    INGENIERO:  ['dashboard','control-plagas','calendario-fitosanitario','recomendaciones','transplante','saca-arroz','carga-arroz','movilidad'],
    ADMIN:      null, // todo
  };

  const permitidos = PERMISOS[ROL];
  return todos.flatMap(sec => {
    const its = sec.items.filter(i => !permitidos || permitidos.includes(i.id));
    return its.length ? [{sec:sec.sec, items:its}] : [];
  });
}

function construirSidebar(){
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML='';
  const mods = getModulosRol();
  mods.forEach(sec => {
    const d = document.createElement('div');
    d.className='nav-sec';
    d.textContent=sec.sec;
    nav.appendChild(d);
    sec.items.forEach(it => {
      const a = document.createElement('a');
      a.className='nav-item';
      a.id='nav-'+it.id;
      a.setAttribute('role', 'menuitem');
      a.onclick = ()=>irA(it.id);
      a.innerHTML=`<span class="nav-ico" aria-hidden="true">${it.ico}</span><span>${it.label}</span>`;
      nav.appendChild(a);
    });
  });
}

  function irA(id){
  if(modActivo === 'mi-asistencia' && id !== 'mi-asistencia') detenerEscaneo();
  modActivo = id;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('activo'));

  if(window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('abierta'); document.getElementById('sidebar-overlay').classList.remove('vis'); }

  const area = document.getElementById('area-contenido');

  const tits = {

    'verificar-tareas':'Verificar Tareas del Día',
    incidencias:'Incidencias del Campo',
    'resumen-diario':'Resumen Diario de Producción',

    movilidad:'Control de Gasolina',
    riego:'Control de Riego',
    materiales:'Gestión de Materiales e Insumos'
  };

  document.getElementById('t-titulo').textContent = tits[id] || 'Módulo';
  document.getElementById('t-bread').textContent = `AgroMoyobamba → ${tits[id]||'Módulo'}`;

  if(id==='dashboard') initDashboard();
  if(id==='trabajadores') listarTrabajadores();
  if(id==='verificar-tareas') listarVerificarTareas();
  if(id==='calendario-fitosanitario') listarCalendario();
  if(id==='recomendaciones') listarRecomendaciones();
  if(id==='control-plagas') listarPlagas();
  if(id==='caja') listarCaja();
  if(id==='materiales') setTimeout(cargarMateriales, 50);

  if(id==='transplante') { setTimeout(()=>cargarLabores('TRANSPLANTE','transplante'), 100); setTimeout(()=>cargarPersonalSeccion('transplante','transplante'), 150); }
  if(id==='saca-arroz')  { setTimeout(()=>cargarLabores('SACA','saca-arroz'), 100); setTimeout(()=>cargarPersonalSeccion('saca','saca-arroz'), 150); }
  if(id==='carga-arroz') { setTimeout(()=>cargarLabores('CARGA','carga-arroz'), 100); setTimeout(()=>cargarPersonalSeccion('carga','carga-arroz'), 150); }
  if(id==='riego')       { setTimeout(()=>cargarPersonalSeccion('riego','riego'), 150); }

async function initDashboard(){
  if(!materiales.length) await cargarMateriales();
  document.getElementById('kpi-personal').textContent = trabajadores.length;
  let totalSacos = asistencias.reduce((acc,cur)=> acc + (cur.sacos||0), 0);
  document.getElementById('kpi-sacos').textContent = totalSacos;

  // KPI: pago estimado total
  let pagoTotal = 0;
  asistencias.forEach(a => {
    const trab = trabajadores.find(t => (t.idTrab || t.id) === a.trabId);
    if(!trab) return;
    const tareas = a.tareasCompletadas || 0;
    pagoTotal += (parseFloat(trab.sueldoBaseDia||0)) + (parseFloat(trab.pagoPorTarea||0) * tareas) + (parseFloat(trab.pagoPorSaco||0) * (a.sacos||0));
  });
  if(document.getElementById('kpi-pago')) document.getElementById('kpi-pago').textContent = 'S/' + Math.round(pagoTotal);

  // ── Gráfico de sacos reales por semana del mes actual ──
  const hoy = new Date();
  const mes = hoy.getMonth(); 
  const anio = hoy.getFullYear();
  const nombreMes = hoy.toLocaleString('es-PE', { month: 'short' });
  const porSemana = [0, 0, 0, 0];
  
  asistencias.forEach(a => {
    if(!a.fecAsist) return;
    const d = new Date(a.fecAsist + 'T00:00:00');
    if(d.getMonth() === mes && d.getFullYear() === anio){
      const sem = Math.min(3, Math.floor((d.getDate() - 1) / 7));
      porSemana[sem] += (parseInt(a.sacos) || 0);
    }
  });

  const maxSacos = Math.max(...porSemana, 1);
  const totalMes = porSemana.reduce((a, b) => a + b, 0);
  const etiquetas = [`01-07 ${nombreMes}`, `08-14 ${nombreMes}`, `15-21 ${nombreMes}`, `22+ ${nombreMes}`];
  const semanaActualIdx = Math.min(3, Math.floor((hoy.getDate() - 1) / 7));

  const chart = document.getElementById('dash-chart-barras');
  if(chart){
    const barsHtml = porSemana.map((v, i) => `
      <div class="ch-fila">
        <span class="ch-lbl" style="${i === semanaActualIdx ? 'font-weight:700;color:var(--v2)' : ''}">${etiquetas[i]}</span>
        <div class="ch-bar-bg"><div class="ch-bar" style="width:${Math.round((v / maxSacos) * 100)}%; background:${i === semanaActualIdx ? 'var(--d1)' : 'var(--v3)'}"></div></div>
        <span class="ch-val">${v} sacos</span>
      </div>`).join('');
    
    chart.innerHTML = barsHtml + `<div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--borde); font-size:12px; color:var(--ts); display:flex; justify-content:space-between"><span>Total ${hoy.toLocaleString('es-PE',{month:'long'})}: <strong>${totalMes} sacos</strong></span> <span>Promedio: <strong>${Math.round(totalMes/4)}/sem</strong></span></div>`;
  }

  // KPI alertas de plagas
  updateNotifBadge();

  // Resumen Materiales
  const matRes = document.getElementById('dash-materiales-resumen');
  if(matRes){
    const criticos = materiales.filter(m => m.stockActual <= m.stockMinimo).slice(0, 3);
    matRes.innerHTML = criticos.length ? criticos.map(m => `
      <div class="dato-fila">
        <span>${m.nombre}</span>
        <span class="val" style="color:#dc2626">${m.stockActual} ${m.unidad}</span>
      </div>`).join('') : '<p style="color:var(--ts);font-size:13px">Inventario saludable ✅</p>';
  }

  // Últimas Labores
  const ultLab = document.getElementById('dash-ultimas-labores');
  if(ultLab){
    const ultimas = asistencias.slice(-5).reverse();
    ultLab.innerHTML = ultimas.map(a => {
      const t = trabajadores.find(w => (w.idTrab || w.id) === a.trabId) || {};
      return `
        <tr>
          <td><strong>${t.nombre||'—'}</strong></td>
          <td>${labelTarea(a.tipoTarea)}</td>
          <td style="color:var(--ts)">${formatFecha(a.fecAsist)}</td>
        </tr>`;
    }).join('');
  }

  // Caja resumen
  let htmlCaja = '';
  movCaja.slice(0, 5).forEach(m => {
    const esIng = (m.tipo||'').toLowerCase() === 'ingreso';
    htmlCaja += `
      <div class="caja-row">
        <span class="caja-icon">${esIng ? '💰' : '💸'}</span>
        <div class="caja-desc"><strong>${m.desc}</strong><span>${formatFecha(m.fecha)}</span></div>
        <span class="caja-monto ${esIng?'ing':'eg'}">${esIng?'+':'-'} S/${parseFloat(m.monto).toLocaleString('es-PE', {minimumFractionDigits: 2})}</span>
      </div>
    `;
  });
  document.getElementById('dash-caja-resumen').innerHTML = htmlCaja || '<p style="padding:16px;color:var(--ts);font-size:13px">Sin movimientos.</p>';
}

function listarTrabajadores(filtro=''){
  const contenedor = document.getElementById('segmentos-personal');
  if(!contenedor) return;

  const tipoFiltro = document.getElementById('filtro-trab-tipo')?.value || '';

  let filtrados = trabajadores.filter(t => {
    const matchTexto = t.nombre.toLowerCase().includes(filtro.toLowerCase()) ||
                       t.dni.includes(filtro);
    const matchTipo  = !tipoFiltro || t.tipoPago === tipoFiltro;
    return matchTexto && matchTipo;
  });

  const segmentos = [
    { key: 'transplante', label: 'Transplante',   color: '#16a34a' },
    { key: 'saca',        label: 'Saca de Arroz',  color: '#ca8a04' },
    { key: 'carga',       label: 'Carga',           color: '#2563eb' },
    { key: 'riego',       label: 'Riego',            color: '#0891b2' },
    { key: 'jornal',      label: 'Jornaleros',       color: '#7c3aed' },
    { key: 'por_saco',    label: 'Por Saco',         color: '#9333ea' },
  ];

  contenedor.innerHTML = segmentos.map(seg => {
    const grupo = filtrados.filter(t => t.tipoPago === seg.key);
    const filas = grupo.length === 0
      ? `<tr><td colspan="5" style="text-align:center;color:var(--ts);padding:14px;font-size:13px">Sin personal asignado</td></tr>`
      : grupo.map(t => `
          <tr>
            <td data-label="Trabajador"><div class="c-nombre"><div class="mini-av">${t.nombre[0]}</div><strong>${t.nombre} ${t.apellido}</strong></div></td>
            <td data-label="DNI"><code>${t.dni}</code></td>
            <td data-label="Cargo"><span class="badge bp">${t.cargo}</span></td>
            <td data-label="Tarifa" style="text-align:right;font-size:12px;color:var(--v2);font-weight:700">S/${t.sueldoDia||t.pagoPorTarea||t.pagoPorSaco||'—'}</td>
            <td data-label="Acciones">
              <div class="acc-wrap"><button class="acc-btn" onclick="toggleMenu(this)">&#8943;</button><div class="acc-menu"><a onclick="verTrabajador(${t.id})">Ver detalle</a><a onclick="vistaPreviaQr(${t.id})">Vista previa QR</a><a onclick="descargarQrTrabajador(${t.id})">Descargar QR</a>${isAdmin() ? '<a onclick="abrirModalEditarTrabajador('+t.id+')">Editar</a><div class="acc-sep"></div><a class="rojo" onclick="eliminarTrabajador('+t.id+')">Dar de baja</a>' : ''}</div></div>
            </td>
          </tr>`).join('');

    return `
      <div class="card">
        <div class="card-hdr" style="border-left:4px solid ${seg.color};padding-left:12px">
          <h3 style="color:${seg.color};font-size:15px">${seg.label}</h3>
          <span style="background:${seg.color}22;color:${seg.color};font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">${grupo.length} persona${grupo.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="tabla-wrap">
          <table>
            <thead><tr><th>Trabajador</th><th>DNI</th><th>Cargo</th><th>Tarifa</th><th>Acciones</th></tr></thead>
            <tbody>${filas}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');
}

// ── Lógica de Mi Asistencia (QR) ──
async function cargarMiAsistenciaHoy() {
  const tbodyPropia = document.getElementById('lista-mi-asistencia-hoy');
  const tbodyGral = document.getElementById('lista-asistencia-general');
  const seccionGral = document.getElementById('seccion-asistencia-general');
  
  if(!tbodyPropia) return;

  const inputDesde = document.getElementById('asist-gral-desde');
  const inputHasta = document.getElementById('asist-gral-hasta');

  let desde, hasta;
  if (inputDesde && inputDesde.value) {
    desde = inputDesde.value;
    hasta = inputHasta.value || desde;
  } else {
    const d = new Date();
    const hoy = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
    desde = hoy;
    hasta = hoy;
    if(inputDesde) inputDesde.value = hoy;
    if(inputHasta) inputHasta.value = hoy;
  }

  const data = await apiFetch(`/api/reportes/asistencia-mixta?desde=${desde}&hasta=${hasta}`);
  if(!data) return;

  // Actualizar títulos según rango seleccionado
  const labelFecha = (desde === hasta) ? `(${formatFecha(desde)})` : `(${formatFecha(desde)} al ${formatFecha(hasta)})`;
  const h3Propio = tbodyPropia.closest('.card').querySelector('h3');
  const h3Gral = tbodyGral?.closest('.card')?.querySelector('h3');
  if(h3Propio) h3Propio.textContent = 'Mis Marcados ' + labelFecha;
  if(h3Gral) h3Gral.textContent = 'Marcado General ' + labelFecha;

  // 1. Llenar tabla propia
  if(!data.propia || data.propia.length === 0) {
    tbodyPropia.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:20px; color:var(--ts)">No has marcado asistencia hoy.</td></tr>`;
  } else {
    tbodyPropia.innerHTML = data.propia.map(a => `
      <tr>
        <td data-label="Entrada" style="font-weight:600; color:var(--v2)">${formatHora(a.horaEntrada, a.fecha)}</td>
        <td data-label="Salida" style="font-weight:600; color:var(--r1)">${a.horaSalida ? formatHora(a.horaSalida, a.fecha) : '—'}</td>
        <td data-label="Estado"><span class="badge ${a.horaSalida ? 'bv' : 'ba'}">${a.horaSalida ? 'COMPLETO' : 'EN CAMPO'}</span></td>
      </tr>
    `).join('');
  }

  // 2. Llenar tabla general si es admin
  if(data.esAdmin) {
    if(seccionGral) seccionGral.style.display = 'block';
    if(tbodyGral) {
      if(!data.general || data.general.length === 0) {
        tbodyGral.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:var(--ts)">No hay registros generales hoy.</td></tr>`;
      } else {
        tbodyGral.innerHTML = data.general.map(a => `
          <tr>
            <td data-label="Trabajador"><strong>${a.trabajador}</strong></td>
            <td data-label="Entrada">${formatHora(a.horaEntrada, a.fecha)}</td>
            <td data-label="Salida">${a.horaSalida ? formatHora(a.horaSalida, a.fecha) : '—'}</td>
            <td data-label="Estado"><span class="badge ${a.horaSalida ? 'bv' : 'ba'}">${a.horaSalida ? 'COMPLETO' : 'EN CAMPO'}</span></td>
          </tr>
        `).join('');
      }
    }
  } else {
    if(seccionGral) seccionGral.style.display = 'none';
  }
}

let html5QrCode = null;

async function ejecutarEscaneoQR() {
  const readerDiv = document.getElementById('qr-reader');
  const btn = document.getElementById('btn-scan');
  
  if(!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");

  if(readerDiv.style.display === 'block') {
    await detenerEscaneo();
    return;
  }

  readerDiv.style.display = 'block';
  btn.textContent = "Detener Cámara";
  btn.classList.replace('btn-p', 'btn-s');

  html5QrCode.start(
    { facingMode: "user" }, 
    { fps: 10, qrbox: { width: 250, height: 250 } },
    async (decodedText) => {
      await detenerEscaneo();
      const res = await apiFetch('/api/asistencia/qr', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token: decodedText })
      });
      if(res) {
        mostrarToast(res.mensaje || "Marcado realizado con éxito");
        cargarMiAsistenciaHoy();
      }
    }
  ).catch(err => {
    mostrarToast("No se pudo acceder a la cámara");
    detenerEscaneo();
  });
}

async function detenerEscaneo() {
  const readerDiv = document.getElementById('qr-reader');
  const btn = document.getElementById('btn-scan');
  if(html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();
  if(readerDiv) readerDiv.style.display = 'none';
  if(btn) {
    btn.textContent = "Escanear QR";
    btn.classList.replace('btn-s', 'btn-p');
  }
}

async function guardarEdicionTrabajador(e, id) {
  e.preventDefault();
  const tp = document.getElementById('et-pago').value;
  const body = {
    nomTrab: document.getElementById('et-nom').value,
    apeTrab: document.getElementById('et-ape').value,
    dniTrab: document.getElementById('et-dni').value,
    tipoPago: tp,
    sueldoDia:    ['jornal','tiempo'].includes(tp) ? parseFloat(document.getElementById('et-sueldo')?.value)||null : null,
    sueldoBaseDia: ['jornal','tiempo'].includes(tp) ? parseFloat(document.getElementById('et-sueldo')?.value)||null : null,
    pagoPorSaco:  ['por_saco','rendimiento','destajo'].includes(tp) ? parseFloat(document.getElementById('et-psaco')?.value)||null : null,
    pagoPorTarea: ['transplante','saca','carga','riego'].includes(tp) ? parseFloat(document.getElementById('et-ptarea')?.value)||null : null,
    cargo: { idCargo: parseInt(document.getElementById('et-cargo').value) }
  };
  try {
    const r = await fetch(`/api/trabajadores/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if(r.ok){
      mostrarToast('Trabajador actualizado');
      cerrarModal();
      await cargarDatosIniciales();
      listarTrabajadores();
    } else {
      const err = await r.json();
      mostrarToast(err.error || 'Error al actualizar');
    }
  } catch(ex){ mostrarToast('Sin conexión'); }
}

async function eliminarTrabajador(id) {

  try {

    if(r !== null) {
      mostrarToast('Trabajador eliminado físicamente de la BD');
      trabajadores = trabajadores.filter(t => t.id !== id);
      listarTrabajadores();

}

function listarVerificarTareas(){
  const container = document.getElementById('lista-verificar-tareas');
  if(!container) return;

  const fechaFiltro  = document.getElementById('filtro-fecha-vt')?.value || '';
  const sectorFiltro = document.getElementById('filtro-sector-vt')?.value || '';
  const estadoFiltro = document.getElementById('filtro-estado-vt')?.value || '';

  let filtradas = asistencias;
  if(fechaFiltro)  filtradas = filtradas.filter(a => a.fecAsist === fechaFiltro);
  if(sectorFiltro) filtradas = filtradas.filter(a => a.tipoTarea === sectorFiltro);
  if(estadoFiltro) filtradas = filtradas.filter(a => (a.estado||'PENDIENTE') === estadoFiltro);

  if(filtradas.length === 0){
    container.innerHTML = `<p style="padding:24px;color:var(--ts);text-align:center">No hay tareas para los filtros seleccionados.</p>`;
    return;
  }

  container.innerHTML = '';
  filtradas.forEach(a => {
    const trab = trabajadores.find(t => t.id === a.trabId) || {nombre:'Trabajador', apellido:'Externo'};
    const estado = a.estado || 'PENDIENTE';
    const tarifa = trab.sueldoDia || trab.pagoPorTarea || trab.pagoPorSaco || 0;
    const tareas = a.tareasCompletadas || 1;
    const pago   = tarifa * tareas;
    const colorEstado = estado==='APROBADO' ? 'bv' : estado==='OBSERVADO' ? 'br' : 'ba';
    const div = document.createElement('div');
    div.className = 'tv-row';
    div.id = `vt-row-${a.id}`;
    div.innerHTML = `
      <div class="tv-info">
        <div class="tv-name">${trab.nombre} ${trab.apellido}</div>
        <div class="tv-tarea">${labelTarea(a.tipoTarea)} · Entrada: ${formatHora(a.hour, a.fecha)} · Tareas: ${tareas} · ${a.observacion||'—'}</div>
      </div>
      <span class="badge ${colorEstado}" id="vt-estado-${a.id}" style="margin-bottom:5px">${estado}</span>
      <div class="tv-pago">S/${pago.toFixed(2)}</div>
      <div class="tv-acc">
        <button class="tbtn success" onclick="aprobarAsistencia(${a.id})" ${estado==='APROBADO'?'disabled':''}>Aprobar</button>
        <button class="tbtn peligro" onclick="observarAsistencia(${a.id})" ${estado==='OBSERVADO'?'disabled':''}>Observar</button>
        <button class="tbtn info" onclick="verAsistencia(${a.id})">Ver</button>
        <button class="tbtn" onclick="eliminarAsistencia(${a.id})">Eliminar</button>
      </div>
    `;
    container.appendChild(div);
  });
}

async function aprobarAsistencia(id) {
  const a = asistencias.find(x => x.id === id);
  if(!a) return;
  try {
    const r = await fetch(`/api/asistencias/${id}/aprobar`, {method:'PATCH'});
    if(r.ok || r.status === 404) {
      // Actualizar estado local aunque no haya endpoint específico
      a.estado = 'APROBADO';
      const badge = document.getElementById(`vt-estado-${id}`);
      if(badge){ badge.className='badge bv'; badge.textContent='APROBADO'; }
      // Persistir override local para mantener estado tras recarga
      saveAsistOverride(id, { estado: 'APROBADO', observacion: a.observacion || '' });
      mostrarToast('Asistencia aprobada para planilla');
    } else { mostrarToast('No se pudo actualizar'); }
  } catch(e) {
    // Actualizar localmente de todos modos
    a.estado = 'APROBADO';
    const badge = document.getElementById(`vt-estado-${id}`);
    if(badge){ badge.className='badge bv'; badge.textContent='APROBADO'; }
    saveAsistOverride(id, { estado: 'APROBADO', observacion: a.observacion || '' });
    mostrarToast('Marcado como aprobado (local)');
  }
}

async function observarAsistencia(id) {
  const motivo = prompt('Motivo de observación (opcional):') ?? '';
  const a = asistencias.find(x => x.id === id);
  if(!a) return;
  try {
    const r = await fetch(`/api/asistencias/${id}/observar`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({motivo})
    });
    a.estado = 'OBSERVADO';
    a.observacion = motivo || a.observacion;
    const badge = document.getElementById(`vt-estado-${id}`);
    if(badge){ badge.className='badge br'; badge.textContent='OBSERVADO'; }
    // Persistir override local
    saveAsistOverride(id, { estado: 'OBSERVADO', observacion: a.observacion || '' });
    mostrarToast('Observación enviada al capataz');
  } catch(e) {
    a.estado = 'OBSERVADO';
    const badge = document.getElementById(`vt-estado-${id}`);
    if(badge){ badge.className='badge br'; badge.textContent='OBSERVADO'; }
    saveAsistOverride(id, { estado: 'OBSERVADO', observacion: a.observacion || '' });
    mostrarToast('Observación registrada (local)');
  }
}

async function eliminarAsistencia(id){
  if(!confirm('¿Eliminar este registro de asistencia? Esta acción actualizará la vista local y (si está disponible) intentará eliminar en el servidor.')) return;
  // Persistir eliminación localmente primero para que sobreviva recargas
  saveAsistOverride(id, { deleted: true });
  try {
    const r = await fetch(`/api/asistencias/${id}`, { method: 'DELETE' });
    if(r.ok){
      // Si el servidor eliminó correctamente, limpiar override
      removeAsistOverride(id);
      asistencias = asistencias.filter(x => x.id !== id);
      const row = document.getElementById(`vt-row-${id}`);
      if(row) row.remove();
      mostrarToast('Registro eliminado');
      return;
    }
  } catch(e){ /* ignore network errors */ }
  // Fallback local delete (override ya guardado)
  asistencias = asistencias.filter(x => x.id !== id);
  const row = document.getElementById(`vt-row-${id}`);
  if(row) row.remove();
  mostrarToast('Registro eliminado (local)');
}

async function listarCaja(){
  const tbody = document.getElementById('lista-caja');
  if(!tbody) return;
  try {
    const r = await fetch('/api/caja');
    if(r.ok) movCaja = await r.json();
  } catch(e){ console.warn('Error cargando caja', e); }
  renderTablaCaja(movCaja);
}

function filtrarCaja() {
  const q = document.getElementById('busq-caja').value.toLowerCase();
  const desde = document.getElementById('caja-desde').value;
  const hasta = document.getElementById('caja-hasta').value;

  const filtrados = movCaja.filter(m => {
    const matchTxt = (m.desc||'').toLowerCase().includes(q) || (m.categoria||'').toLowerCase().includes(q);
    const matchDesde = !desde || m.fecha >= desde;
    const matchHasta = !hasta || m.fecha <= hasta;
    return matchTxt && matchDesde && matchHasta;
  });
  renderTablaCaja(filtrados);
}

function renderTablaCaja(lista) {
  const tbody = document.getElementById('lista-caja');
  if(!tbody) return;

  let ingresos = 0, egresos = 0;
  lista.forEach(m => {
    const mt = parseFloat(m.monto || 0);
    if((m.tipo||'').toLowerCase() === 'ingreso') ingresos += mt;
    else egresos += mt;
  });

  if(document.getElementById('caja-saldo')) document.getElementById('caja-saldo').textContent = 'S/' + (ingresos - egresos).toLocaleString('es-PE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if(document.getElementById('caja-ingresos')) document.getElementById('caja-ingresos').textContent = 'S/' + ingresos.toLocaleString('es-PE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if(document.getElementById('caja-egresos')) document.getElementById('caja-egresos').textContent = 'S/' + egresos.toLocaleString('es-PE', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  if(!lista.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--ts)">Sin movimientos registrados.</td></tr>`;
    return;
  }

  tbody.innerHTML = lista.map(m => {
    const esIng = (m.tipo||'').toLowerCase() === 'ingreso';
    return `
      <tr>
        <td data-label="Fecha" style="color:var(--ts); font-size:12.5px">${formatFecha(m.fecha)}</td>
        <td data-label="Movimiento">
          <div style="display:flex; align-items:center; gap:8px">
            <span style="font-size:16px">${esIng ? '💰' : '💸'}</span>
            <strong style="font-size:13.5px">${m.desc}</strong>
          </div>
        </td>
        <td data-label="Categoría"><span class="badge ${esIng?'bb':'bg'}">${m.categoria || 'General'}</span></td>
        <td data-label="Monto" style="text-align:right; font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:${esIng?'var(--v2)':'var(--r1)'}">
          ${esIng ? '+ ' : '- '} S/${parseFloat(m.monto).toLocaleString('es-PE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
        </td>
        <td data-label="Acciones" style="text-align:center">
          ${isAdmin() ? `
            <div class="acc-wrap"><button class="acc-btn" onclick="toggleMenu(this)">&#8943;</button>
            <div class="acc-menu"><a class="rojo" onclick="eliminarMovCaja(${m.id})">Eliminar</a></div></div>` : '—'}

      </tr>`;
  }).join('');
}

function labelTarea(k){
  return {TRANSPLANTE:'Transplante',SACA:'Saca de arroz',CARGA:'Carga',DIA:'Día',FUMIGACION:'Fumigación',ABONO:'Abono'}[k]||k;
}

function formatFecha(f, h){
  if(!f) return '–';
  let s = Array.isArray(f) ? `${f[0]}-${String(f[1]).padStart(2,'0')}-${String(f[2]).padStart(2,'0')}` : f;
  
  // Si tenemos hora, convertimos desde UTC completo
  if (h) {
    let hh = Array.isArray(h) ? h[0] : parseInt(h.split(':')[0]);
    let mm = Array.isArray(h) ? h[1] : parseInt(h.split(':')[1]);
    const isoStr = `${s}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00`;
    return new Date(isoStr).toLocaleDateString('es-PE', {day:'2-digit',month:'short',year:'numeric'});
  }

  const d=new Date(s+'T00:00:00'); // Fallback local
  return d.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
}

function formatHora(h, f) {
  if (!h) return '—';
  let hh, mm, ss = 0;
  
  // Parseo del formato del servidor (Array de Jackson o String ISO)
  if (Array.isArray(h)) {
    hh = h[0];
    mm = String(h[1]).padStart(2, '0');
  } else if (typeof h === 'string') {
    const parts = h.split(':');
    hh = parseInt(parts[0]);
    mm = parts[1];
    ss = parts[2] || 0;
  } else return '—';

  // Creamos la fecha local y forzamos la interpretación como America/Lima
  const s = f ? (Array.isArray(f) ? `${f[0]}-${String(f[1]).padStart(2,'0')}-${String(f[2]).padStart(2,'0')}` : f) : new Date().toLocaleDateString('en-CA');
  const isoStr = `${s}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  
  // El navegador convertirá cualquier hora (UTC o local) a la visualización de Lima
  return new Date(isoStr).toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'America/Lima' });
}
