// ── WebSocket Real-Time ──
let stompClient = null;

function conectarWebSocket() {
    const socket = new SockJS('/ws');
    stompClient = Stomp.over(socket);
    stompClient.debug = null; // Silencia logs excesivos

    stompClient.connect({}, function (frame) {
        console.log('✅ Conectado al canal de tiempo real');
        
        stompClient.subscribe('/topic/asistencia-updates', function (message) {
            const a = JSON.parse(message.body);
            
            // Adaptar el objeto del backend al formato del array local 'asistencias'
            const asistenciaActualizada = {
                id:          a.idAsist,
                trabId:      a.trabajador?.idTrab,
                fecAsist:    a.fecAsist,
                fecha:       a.fecAsist,
                tipoTarea:   a.tipoTarea || 'DIA',
                presente:    a.presente,
                estado:      a.estadoAprobacion || 'PENDIENTE',
                hour:        a.horaEntrada || '06:00',
                horaEntrada: a.horaEntrada,
                horaSalida:  a.horaSalida,
                sacos:       a.sacosCosechados,
                tareasCompletadas: a.tareasCompletadas || 0,
                observacion: a.observacionSupervisor || ''
            };

            // Actualizar el array global sin recargar
            const index = asistencias.findIndex(x => x.id === asistenciaActualizada.id);
            if (index !== -1) {
                asistencias[index] = asistenciaActualizada;
            } else {
                asistencias.push(asistenciaActualizada);
            }

            // Refrescar solo la vista que está abierta actualmente
            refrescarVistasRealTime(a.trabajador?.nomTrab || 'Un trabajador');
        });
    }, function(error) {
        console.log('⚠️ Error en WebSocket, reintentando en 5s...');
        setTimeout(conectarWebSocket, 5000);
    });
}

function refrescarVistasRealTime(nombreTrabajador) {
    if (modActivo === 'dashboard') initDashboard();
    if (modActivo === 'mi-asistencia') cargarMiAsistenciaHoy();
    if (modActivo === 'resumen-diario') irA('resumen-diario');
    if (modActivo === 'verificar-tareas') listarVerificarTareas();
    if (['transplante', 'saca-arroz', 'carga-arroz', 'riego'].includes(modActivo)) irA(modActivo);
    
    mostrarToast(`Actualización: Marcado de ${nombreTrabajador} registrado`);
}

// ── ARRANCADOR SEGURO (Previene pantallas en blanco ante fallos del API o tablas vacías) ──
async function arrancarEcosistema() {
  try {
    // 1. Validar la sesión con Spring Security
    await verificarSesionServidor();
  } catch (e) {
    console.warn("Fallo en sesión del servidor, usando valores por defecto:", e);
  }

  try {
    // 2. Cargar tablas reales desde PostgreSQL
    await cargarDatosIniciales();
  } catch (e) {
    console.error("Fallo al conectar con las tablas de PostgreSQL:", e);
    mostrarToast("Cargando modo de contingencia local");
  }

  // Iniciar la escucha de actualizaciones en tiempo real
  conectarWebSocket();

  // 3. Forzar el despliegue del cascarón de la APP y arrancar vistas
  document.getElementById('pantalla-app').style.display = 'block';
  iniciarApp();
  initAccessibility();
  updateNotifBadge();
}

async function generarPlanilla() {
  const trabId = document.getElementById('planilla-trab').value;
  const planillaTipo = document.getElementById('planilla-tipo').value;
  const desde  = document.getElementById('planilla-desde').value;
  const hasta  = document.getElementById('planilla-hasta').value;
  if(!desde||!hasta){mostrarToast('Seleccione el período');return;}
  document.getElementById('btn-pdf-resumen').style.display = 'none';
  const cont = document.getElementById('tabla-planilla');
  cont.innerHTML='<p style="color:var(--ts)">Procesando labores del periodo...</p>';

  // Forzamos la generación/actualización de planillas antes de listar
  const bodyGen = { idTrab: trabId || null, fechaInicio: desde, fechaFin: hasta };
  await apiFetch('/api/planillas/generar', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify(bodyGen)
  });

  if(trabId){
    const planillas = await apiFetch(`/api/planillas/periodo?desde=${desde}&hasta=${hasta}`);
    const p = planillas ? planillas.find(x => x.trabajador && x.trabajador.idTrab == trabId) : null;
    if(!p) { cont.innerHTML='<p style="color:var(--ts); font-size:0.8125rem">No se encontraron labores para este trabajador.</p>'; return; }

    const t = trabajadores.find(x=>x.id==trabId)||{};
    const planillaId = p.idPlanilla || p.id;
    const estadoPlanilla = (p.estado || 'GENERADA').toString().toUpperCase();
    const yaPagado = estadoPlanilla === 'PAGADO' || estadoPlanilla === 'PAGADA';
    cont.innerHTML=`
      <div class="pago-display" style="max-width:480px">
        <div style="font-size:0.8125rem;color:var(--ts);margin-bottom:4px">
          ${t.nombre||''} ${t.apellido||''} · ${etiquetaTipoPago(t.tipoPago)}
        </div>
        <div class="pago-num">S/${parseFloat(p.montoTotal||0).toFixed(2)}</div>
        <span class="pago-lbl">
          ${p.totalDias>0?p.totalDias+' días':''}
          ${p.totalSacos>0?p.totalSacos+' sacos':''}
          ${p.totalTareas>0?p.totalTareas+' tareas de '+p.tipoTareaPlanilla:''}
          · ${desde} al ${hasta}
        </span>
      </div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:14px;flex-wrap:wrap">
        ${planillaId ? (yaPagado ? `
          <span class="badge bv" style="font-size:0.8125rem;padding:6px 14px">Planilla ya pagada</span>
          <button class="btn-d" onclick="descargarBoletaPdf(${planillaId})">Descargar Boleta</button>
          <button class="btn-s" onclick="toggleAccordion(${trabId}, '${desde}', '${hasta}', 'indiv')">Ver Desglose</button>
        ` : `
          <button class="btn-p" onclick="pagarPlanilla(${planillaId})">Marcar como Pagado</button>
          <button class="btn-s" onclick="toggleAccordion(${trabId}, '${desde}', '${hasta}', 'indiv')">Ver Desglose</button>
          <button class="btn-s" onclick="anularPlanilla(${planillaId})">Anular</button>
        `) : ''}
        <span style="font-size:0.75rem;color:var(--ts)">ID: ${planillaId||'—'} · Estado: <strong>${estadoPlanilla}</strong></span>
      </div>
      <div id="acc-indiv" style="display:none; background:rgba(45,139,45,0.02); border-radius:12px; margin-top:15px">
        <div id="content-indiv" style="padding:15px; border-left:3px solid var(--v3); margin:10px"></div>
      </div>`;
  } else {
    const resumen = await apiFetch(`/api/reportes/resumen-labores?desde=${desde}&hasta=${hasta}${planillaTipo ? '&tipo='+planillaTipo : ''}`);
    let planillas = await apiFetch(`/api/planillas/periodo?desde=${desde}&hasta=${hasta}`);
    if(!resumen || !planillas) return;
    
    // Filtrar solo trabajadores activos
    planillas = planillas.filter(p => p.trabajador && p.trabajador.activo);

    if(resumen.totalAsistencias > 0) document.getElementById('btn-pdf-resumen').style.display = 'inline-flex';

    // Filtrar trabajadores que han realizado actividades (monto > 0)
    planillas = planillas.filter(p => parseFloat(p.montoTotal || 0) > 0);

    // Filtrar por tipo si se especificó
    if(planillaTipo) {
      planillas = planillas.filter(p => {
        if (!p.trabajador || !p.trabajador.tipoPago) return false;
        const tp = p.trabajador.tipoPago.toLowerCase();
        if (planillaTipo === 'jornal') return tp === 'jornal';
        if (planillaTipo === 'por_saco') return tp === 'por_saco';
        return tp === planillaTipo.toLowerCase();
      });
    }

    // Filtrar para mostrar solo la planilla más reciente por trabajador y evitar duplicados
    const planillasUnicas = new Map();
    planillas.forEach(p => {
      const tid = p.trabajador?.idTrab;
      if(!planillasUnicas.has(tid) || (p.idPlanilla || p.id) > (planillasUnicas.get(tid).idPlanilla || planillasUnicas.get(tid).id)) {
        planillasUnicas.set(tid, p);
      }
    });
    planillas = Array.from(planillasUnicas.values());

    const totalPagar = planillas.reduce((acc, p) => acc + (parseFloat(p.montoTotal || 0)), 0);
    const kpiCount = 1;
    const kpiCards = `
        <div class="kpi-card"><div class="kpi-ico ki-verde"></div><div><span class="kpi-num" style="font-size:1.375rem">S/${totalPagar.toFixed(2)}</span><span class="kpi-lbl">Total a Pagar${planillaTipo ? ' (' + etiquetaTipoPago(planillaTipo) + ')' : ''}</span></div></div>
    `;

    let htmlPlanillas = (planillas && planillas.length > 0) ? planillas.map(p => {
      const t = p.trabajador || {};
      const yaPagado = (p.estado||'').toUpperCase() === 'PAGADO';
      
      let detalleTxt = '';
      if (p.totalDias > 0) detalleTxt += p.totalDias + ' días ';
      if (p.totalSacos > 0) detalleTxt += p.totalSacos + ' sacos ';
      if (p.totalTareas > 0) detalleTxt += p.totalTareas + ' tareas ';
      if (!detalleTxt) detalleTxt = '—';

      return `
        <tr id="row-${p.idPlanilla || p.id}">
          <td data-label="Trabajador"><div class="c-nombre"><strong>${t.nomTrab} ${t.apeTrab}</strong></div></td>
          <td data-label="Tipo"><span class="badge bb">${etiquetaTipoPago(t.tipoPago)}</span></td>
          <td data-label="Detalle" style="font-size:0.75rem; color:var(--ts)">${detalleTxt}</td>
          <td data-label="Monto" style="text-align:right; font-weight:700">S/${parseFloat(p.montoTotal||0).toFixed(2)}</td>
          <td data-label="Estado"><span class="badge ${yaPagado?'bv':'ba'}">${p.estado.toUpperCase()}</span></td>
          <td data-label="Acciones" style="white-space:nowrap">
            <button class="tbtn" onclick="toggleAccordion(${t.idTrab}, '${desde}', '${hasta}', ${p.idPlanilla || p.id})" title="Ver Desglose">Ver Desglose</button>
            ${yaPagado ? `<button class="tbtn" onclick="descargarBoletaPdf(${p.idPlanilla})" title="Boleta PDF">PDF</button>` : ''}
          </td>
        </tr>
        <tr id="acc-${p.idPlanilla || p.id}" style="display:none; background:rgba(45,139,45,0.02)">
          <td colspan="5" style="padding:0">
            <div id="content-${p.idPlanilla || p.id}" style="padding:15px; border-left:3px solid var(--v3); margin:10px"></div>
          </td>
        </tr>`;
    }).join('') : `<tr><td colspan="5" style="text-align:center; padding:20px; font-size:0.8125rem">No hay planillas ${planillaTipo ? 'de tipo '+etiquetaTipoPago(planillaTipo) : ''} generadas en este rango.</td></tr>`;

    cont.innerHTML=`
      <div class="kpi-grid" style="grid-template-columns:repeat(${kpiCount},1fr); margin-bottom: 1.25rem;">
        ${kpiCards}
      </div>
      <div class="card">
        <div class="card-hdr"><h3>Desglose de Pagos del Periodo</h3></div>
        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>Trabajador</th>
                <th>Tipo de Trabajo</th>
                <th>Tareas / Detalle</th>
                <th style="text-align:right">Monto</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>${htmlPlanillas}</tbody>
          </table>
        </div>
      </div>`;
  }
}

async function pagarPlanilla(id) {
  // Verificar estado actual de la planilla para evitar pagos duplicados
  try {
    const check = await fetch(`/api/planillas/${id}`);
    if(check.ok){
      const chk = await check.json();
      const estado = (chk.estado||'').toString().toUpperCase();
      if(estado === 'PAGADO' || estado === 'PAGADA'){
        mostrarToast('Esta planilla ya fue pagada previamente');
        return;
      }
    }
  } catch(e){ console.warn('No se pudo verificar estado de planilla antes de pagar',e); }

  if(!confirm('¿Confirmar pago de esta planilla?')) return;
  try {
    const r = await fetch(`/api/planillas/${id}/pagar`, {method:'PATCH'});
    if(r.ok){
      mostrarToast('Planilla marcada como PAGADA');
      // Actualizar estado y botón en el DOM
      const btn = document.querySelector(`[onclick="pagarPlanilla(${id})"]`);
      const statusStrong = btn?.closest('div')?.querySelector('strong');
      if(statusStrong) statusStrong.textContent = 'PAGADO';
      // Intentar leer monto y trabajador desde el DOM; si falla, intentar fetch de la planilla
      let monto = 0;
      let desc = `Pago planilla ${id}`;
      try {
        if(btn){
          const parent = btn.closest('div')?.parentElement;
          const display = parent?.querySelector('.pago-display');
          if(display){
            const montoTxt = display.querySelector('.pago-num')?.textContent || '';
            const mclean = montoTxt.replace(/[^0-9.,-]/g, '').replace(',', '.');
            monto = parseFloat(mclean) || 0;
            const info = display.querySelector('div')?.textContent || '';
            const nombre = info.split('·')[0]?.trim();
            if(nombre) desc = `Pago planilla ${id} · ${nombre}`;
          } else {
            const pd = await fetch(`/api/planillas/${id}`);
            if(pd.ok){
              const pdj = await pd.json();
              monto = parseFloat(pdj.montoTotal || 0);
              if(pdj.trabajador) desc = `Pago planilla ${id} · ${pdj.trabajador.nomTrab || pdj.trabajador.nombre || ''} ${pdj.trabajador.apeTrab || pdj.trabajador.apellido || ''}`.trim();
            }
          }
        }
      } catch(e) {
        console.warn('No se pudo obtener monto/descripcion de planilla:', e);
      }

      if(btn){ btn.outerHTML = `<span class="badge bv" style="font-size:0.8125rem;padding:6px 14px">Planilla pagada</span>`; }

      // Registrar movimiento en caja (EGRESO) en backend
      try {
        const cajaBody = { tipo: 'EGRESO', desc: desc, monto: monto, fecha: new Date().toISOString().slice(0,10), ico: '' };
        const rc = await fetch('/api/caja', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cajaBody)});
        if(rc && rc.ok){
          const saved = await rc.json();
          movCaja.unshift(saved);
          listarCaja();
        } else {
          // si falla, mantener registro local como fallback
          movCaja.unshift({ id: movCaja.length+1, tipo:'EGRESO', desc, monto, fecha: new Date().toISOString().slice(0,10), ico:'' });
          listarCaja();
        }
      } catch(e){
        console.warn('No se pudo guardar movimiento en servidor, guardando localmente', e);
        movCaja.unshift({ id: movCaja.length+1, tipo:'EGRESO', desc, monto, fecha: new Date().toISOString().slice(0,10), ico:'' });
        listarCaja();
      }
    } else { mostrarToast('No se pudo marcar como pagada'); }
  } catch(e){ mostrarToast('Sin conexión'); }
}

async function anularPlanilla(id) {
  const motivo = prompt('Motivo de anulación:');
  if(motivo === null) return;
  try {
    const r = await fetch(`/api/planillas/${id}/anular`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({motivo: motivo || 'Sin motivo'})
    });
    if(r.ok){ mostrarToast('Planilla anulada'); generarPlanilla(); }
    else mostrarToast('No se pudo anular');
  } catch(e){ mostrarToast('Sin conexión'); }
}

async function guardarRiego(){
  const body={
    trabajador:{idTrab:parseInt(document.getElementById('ri-trab').value)},
    fecAsist:  document.getElementById('ri-fecha').value,
    horaEntrada:document.getElementById('ri-hinicio').value||null,
    horaSalida: document.getElementById('ri-hfin').value||null,
    presente:true,
    tipoTarea:'RIEGO',
    tareasCompletadas:parseInt(document.getElementById('ri-tareas').value)||0,
    observacionSupervisor:document.getElementById('ri-obs').value
  };
  try{
    const r=await fetch('/api/asistencias',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){mostrarToast('Riego registrado correctamente');cerrarModal();await cargarDatosIniciales();}
    else mostrarToast('Error al registrar');

async function guardarIncidencia(){
  const idTrab = document.getElementById('inc-trab')?.value;
  const fecha  = document.getElementById('inc-fecha')?.value;
  const tipo   = document.getElementById('inc-tipo')?.value;
  const desc   = document.getElementById('inc-descripcion')?.value;
  const estado = document.getElementById('inc-estado')?.value;
  if(!idTrab||!fecha||!tipo){ mostrarToast('Complete los campos obligatorios'); return; }
  const body = {
    trabajador: { idTrab: parseInt(idTrab) },
    fecha: fecha,
    tipo: tipo,
    descripcion: desc,
    estado: estado
  };
  try{
    const r = await fetch('/api/incidencias', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(r.ok){
      mostrarToast('Incidencia registrada correctamente');
      cerrarModal();
      await cargarIncidencias();
    } else {
      const txt = await r.text();
      mostrarToast('Error al guardar: ' + txt);
    }
  }catch(e){
    mostrarToast('Error de comunicación con el servidor');
  }
}

function renderTablaIncidencias(tbody){
  if(!incidenciasData.length){
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--ts);padding:24px">No hay incidencias registradas.</td></tr>`;
    return;
  }
  tbody.innerHTML = incidenciasData.map((inc,i)=>{
    const t = inc.trabajador || {};
    const colores = {PENDIENTE:'#fef3c7;color:#92400e', EN_PROCESO:'#dbeafe;color:#1e40af', RESUELTO:'#d1fae5;color:#065f46'};
    const estilo  = colores[inc.estado] || '#f3f4f6;color:#374151';
    const clases = {PENDIENTE:'ba', EN_PROCESO:'bb', RESUELTO:'bv'};
    const clase  = clases[inc.estado] || 'bg';
    const idInc = inc.id;

    return `<tr>
      <td data-label="Fecha">${formatFecha(inc.fecha)}</td>
      <td data-label="Trabajador"><strong>${t.nombre||'—'} ${t.apellido||''}</strong></td>
      <td data-label="Tipo">${inc.tipo}</td>
      <td data-label="Descripción">${inc.descripcion||'—'}</td>
      <td data-label="Estado"><span class="badge ${clase}">${inc.estado}</span></td>

        </div>
      </td>
    </tr>`;
  }).join('');
}

async function actualizarEstadoIncidencia(id, nuevoEstado) {
  try {
    const r = await fetch(`/api/incidencias/${id}/estado`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ estado: nuevoEstado })
    });

      mostrarToast('Estado actualizado: ' + nuevoEstado);
      cargarIncidencias(); // Recargar tabla
    }
  } catch (e) {
    mostrarToast('Error al actualizar estado');
  }
}

async function eliminarIncidencia(id) {
  if (!confirm('¿Seguro que desea eliminar esta incidencia permanentemente?')) return;
  try {
    const r = await fetch(`/api/incidencias/${id}`, { method: 'DELETE' });
    if (r.ok) {
      mostrarToast('Incidencia eliminada de la base de datos');
      cargarIncidencias();

    mostrarToast('Error al eliminar');

}

async function cargarIncidencias(){
  const tbody = document.getElementById('lista-incidencias');
  if(!tbody) return;
  try{
    const r = await fetch('/api/incidencias');
    if(!r.ok) throw new Error();
    const data = await r.json();
    incidenciasData = Array.isArray(data) ? data
      .filter(i => i.trabajador && i.trabajador.activo)
      .map(i => ({
        id: i.id, 
        fecha: i.fecha || i.fecha_reporte || '',
        tipo: i.tipo,
        descripcion: i.descripcion,
        estado: i.estado,
        trabajador: i.trabajador ? { nombre: i.trabajador.nomTrab, apellido: i.trabajador.apeTrab, id: i.trabajador.idTrab } : { nombre: 'N/A' }
      })) : [];
    renderTablaIncidencias(tbody);
  }catch(e){
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--ts);padding:24px">Error al cargar incidencias.</td></tr>`;
  }
}

let abonosCargados = [];

async function cargarAbonos(){
  const tbody = document.getElementById('lista-abonos');
  if(!tbody) return;
  try{
    const r = await fetch('/api/abonos');
    if(!r.ok) throw new Error();
    const data = await r.json();
    abonosCargados = data.filter(a => a.trabajador && a.trabajador.activo);
    renderTablaAbonos(abonosCargados);
  }catch(e){
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--ts);padding:24px">Error al cargar abonos.</td></tr>`;
  }
}

function filtrarAbonos() {
  const txtTrab = document.getElementById('filtro-ab-trab')?.value.toLowerCase() || '';
  const mes     = document.getElementById('filtro-ab-mes')?.value || '';   // "2026-05"
  const tipo    = document.getElementById('filtro-ab-tipo')?.value || '';
  let data = abonosCargados;
  if(txtTrab) data = data.filter(a => (`${a.trabajador?.nombre||''} ${a.trabajador?.apellido||''}`).toLowerCase().includes(txtTrab));
  if(mes)     data = data.filter(a => (a.fecha||'').startsWith(mes));
  if(tipo)    data = data.filter(a => a.tipoSaco === tipo);
  renderTablaAbonos(data);
}

function renderTablaAbonos(data) {
  const tbody = document.getElementById('lista-abonos');
  const totalEl = document.getElementById('total-ab-sacos');
  if(!tbody) return;
  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--ts);padding:24px">No hay registros con esos filtros.</td></tr>`;
    if(totalEl) totalEl.textContent = '0';
    return;
  }
  const totalSacos = data.reduce((s,a)=>s+(a.cantidadSacos||0),0);
  if(totalEl) totalEl.textContent = totalSacos;
  tbody.innerHTML = data.map(a=>`<tr>
    <td>${a.fecha||'—'}</td>
    <td>${a.trabajador?.nombre||'—'} ${a.trabajador?.apellido||''}</td>
    <td><span class="badge bb">${a.tipoSaco||'—'}</span></td>
    <td style="font-weight:700;text-align:center">${a.cantidadSacos||0} sacos</td>
    <td>${a.parcela||'—'}</td>
    <td style="color:var(--ts);font-size:12px">${a.observacion||'—'}</td>
    <td>${isAdmin() ? '<div class="acc-wrap"><button class="acc-btn" onclick="toggleMenu(this)">&#8943;</button><div class="acc-menu"><a class="rojo" onclick="eliminarAbono('+(a.idAbono||a.id)+')">Eliminar</a></div></div>' : ''}</td>
  </tr>`).join('');
}

  if(!confirm('¿Eliminar este registro de abono?')) return;
  try {
    const r = await fetch(`/api/abonos/${id}`, {method:'DELETE'});

let gasolinaCargada = [];

async function cargarGasolina(){
  const tbody = document.getElementById('lista-gasolina');
  if(!tbody) return;
  try{
    const r = await fetch('/api/gasolina');
    if(!r.ok) throw new Error();
    gasolinaCargada = await r.json();
    renderTablaGasolina(gasolinaCargada);
  }catch(e){
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--ts);padding:24px">Error al cargar registros.</td></tr>`;
  }
}

function filtrarGasolina() {
  const tipo  = document.getElementById('filtro-gas-tipo')?.value || '';
  const desde = document.getElementById('filtro-gas-desde')?.value || '';
  const hasta = document.getElementById('filtro-gas-hasta')?.value || '';
  let data = gasolinaCargada;
  if(tipo)  data = data.filter(g => g.tipoUso === tipo);
  if(desde) data = data.filter(g => (g.fecha||'') >= desde);
  if(hasta) data = data.filter(g => (g.fecha||'') <= hasta);
  renderTablaGasolina(data);
}

function renderTablaGasolina(data) {
  const tbody   = document.getElementById('lista-gasolina');
  const totalEl = document.getElementById('total-gas-litros');
  const rt      = document.getElementById('resumen-transporte');
  const rf      = document.getElementById('resumen-fumigacion');
  if(!tbody) return;

  const lt = (tipo) => data.filter(g=>g.tipoUso===tipo).reduce((a,c)=>a+(parseFloat(c.litros)||0),0).toFixed(1);
  if(rt) rt.textContent = lt('TRANSPORTE_PERSONAL') + ' L';
  if(rf) rf.textContent = lt('FUMIGACION') + ' L';
  const totalL = data.reduce((s,g)=>s+(parseFloat(g.litros)||0),0);
  if(totalEl) totalEl.textContent = totalL.toFixed(1) + ' L';

  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--ts);padding:24px">No hay registros con esos filtros.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(g=>`<tr>
    <td>${g.fecha||'—'}</td>
    <td>${g.tipoUso==='FUMIGACION'?'Fumigación':'Transporte'}</td>
    <td>${g.vehiculo||g.maquinaFumigacion||'—'}</td>
    <td style="font-weight:700;text-align:center">${g.litros||0} L</td>
    <td>${g.parcela||'—'}</td>
    <td>${g.responsable||'—'}</td>
    <td><div class="acc-wrap"><button class="acc-btn" onclick="toggleMenu(this)">&#8943;</button><div class="acc-menu">${isAdmin() ? '<a onclick="abrirModalEditarGasolina('+(g.idGasolina||g.id)+')">Editar</a><div class="acc-sep"></div><a class="rojo" onclick="eliminarGasolina('+(g.idGasolina||g.id)+')">Eliminar</a>' : ''}</div></div></td>
  </tr>`).join('');
}

async function cargarLabores(tipoTarea, seccionId) {
  const tbody = document.getElementById('lista-labor-' + seccionId);
  const totalEl = document.getElementById('total-labor-' + seccionId);
  if(!tbody) return;
  try {
    const rawData = await apiFetch(`/api/asistencias?tipoTarea=${tipoTarea}`);
    const data = (rawData || []).filter(a => a.trabajador && a.trabajador.activo);
    if(!data.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--ts);padding:18px;font-size:13px">Sin registros aún.</td></tr>`;
      if(totalEl) totalEl.textContent = 'S/0.00';
      return;
    }
    let totalAcum = 0;
    tbody.innerHTML = data.map(a => {
      // Datos del trabajador vienen embebidos en la respuesta de asistencia
      const trabObj  = a.trabajador || {};
      const nomTrab  = trabObj.nomTrab  || '—';
      const apeTrab  = trabObj.apeTrab  || '';
      const inicial  = nomTrab[0] || '?';
      const tareas   = a.tareasCompletadas || 0;
      const pago     = parseFloat(trabObj.pagoPorTarea || 0);
      const subtotal = tareas * pago;
      totalAcum += subtotal;
      return `<tr>
        <td>${a.fecAsist || '—'}</td>
        <td><div class="c-nombre"><div class="mini-av">${inicial}</div><strong>${nomTrab} ${apeTrab}</strong></div></td>
        <td>${a.observacionSupervisor || '—'}</td>
        <td style="text-align:center;font-weight:700">${tareas}</td>
        <td style="text-align:right">S/${pago.toFixed(2)}</td>
      <td style="text-align:right;color:var(--v2);font-weight:700">S/${subtotal.toFixed(2)}</td>
      </tr>`;
    }).join('');
    if(totalEl) totalEl.textContent = 'S/' + totalAcum.toFixed(2);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:red;padding:18px">Error al cargar.</td></tr>`;
  }
}

// ── Carga personal filtrado desde el backend por tipo de pago ──
async function cargarPersonalSeccion(tipoPago, seccionId) {
  const data = await apiFetch(`/api/trabajadores/tipo/${tipoPago}`);
  if (!data) return;

  // Caso riego: actualiza el card de Trabajadores de Riego
  if (seccionId === 'riego') {
    const cards = document.querySelectorAll('.card');
    let riegoCard = null;
    for (const c of cards) {
      if (c.querySelector('h3')?.textContent.includes('Trabajadores de Riego')) { riegoCard = c; break; }
    }
    if (riegoCard) {
      const body = riegoCard.querySelector('div[style*="padding"]');
      if (body) {
        body.innerHTML = data.length === 0
          ? '<p style="color:var(--ts);font-size:13px">Ningún trabajador asignado a riego aún.</p>'
          : data.map(t => `
              <div class="dato-fila">
                <span>${t.nomTrab} ${t.apeTrab}</span>
                <span class="val">S/${t.pagoPorTarea||'—'} / tarea</span>
              </div>`).join('');
      }
    }
    return;
  }

  // Para transplante, saca-arroz, carga-arroz: busca la primera tabla de personal
  const modId = seccionId === 'transplante' ? 'transplante' : seccionId === 'saca' ? 'saca-arroz' : 'carga-arroz';
  const mod = document.getElementById(`mod-${modId}`);
  if (!mod) return;
  const tablas = mod.querySelectorAll('table');
  const tbody = tablas[0]?.querySelector('tbody');
  const countEl = mod.querySelector('.card-hdr span[style*="color"]');

  if (!tbody) return;
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--ts);padding:14px;font-size:13px">Sin personal asignado a esta sección.</td></tr>';
  } else {
    tbody.innerHTML = data.map(t => `
      <tr>
        <td><div class="c-nombre"><div class="mini-av">${(t.nomTrab||'?')[0]}</div><strong>${t.nomTrab} ${t.apeTrab}</strong></div></td>
        <td><code>${t.dniTrab}</code></td>
        <td><span class="badge bp">${t.cargoNombre || 'Obrero'}</span></td>
      </tr>`).join('');
  }
  if (countEl) countEl.textContent = `${data.length} persona${data.length !== 1 ? 's' : ''}`;
}

async function abrirModalLabor(tipoTarea, tipoPago) {
  // Carga solo el personal del tipo correspondiente desde el backend
  const personalBD = await apiFetch(`/api/trabajadores/tipo/${tipoPago}`);
  const personal = personalBD || trabajadores.filter(t => {
    if (t.tipoPago === tipoPago) return true;
    if (['transplante', 'saca', 'riego'].includes(tipoPago) && (t.tipoPago === 'jornal' || t.tipoPago === 'tiempo')) return true;
    if (tipoPago === 'carga' && ['por_saco', 'rendimiento', 'destajo'].includes(t.tipoPago)) return true;
    return false;
  });
  const opsTrab = personal.map(t => {
    const id    = t.idTrab   ?? t.id;
    const nom   = t.nomTrab  ?? t.nombre;
    const ape   = t.apeTrab  ?? t.apellido;
    const pago  = t.pagoPorTarea ?? 0;
    return `<option value="${id}" data-pago="${pago}">${nom} ${ape} (S/ ${pago}/tarea)</option>`;
  }).join('');
  abrirModal(`
    <h3 class="modal-tit">Registrar Labor — ${tipoTarea}</h3>
    <div class="form-grid">
      <div class="fc"><label>Fecha</label><input type="date" id="lab-fecha" value="${new Date().toLocaleDateString('en-CA')}"></div>
      <div class="fc"><label>Parcela / Sector</label>
        <select id="lab-parcela">
          <option value="Lote A – Zona Norte">Lote A – Zona Norte</option>
          <option value="Lote B – Zona Sur">Lote B – Zona Sur</option>
          <option value="Lote C – Zona Este">Lote C – Zona Este</option>
        </select>
      </div>
      <div class="fc full"><label>Trabajador</label>
        <select id="lab-trab" onchange="calcularPagoLabor()">${opsTrab || '<option disabled>Sin personal asignado</option>'}</select>
      </div>
      <div class="fc"><label>Nº de Tareas Realizadas</label><input type="number" id="lab-tareas" value="1" min="0" oninput="calcularPagoLabor()"></div>
      <div class="fc"><label>Pago Calculado</label>
        <div class="pago-display" style="margin:0;padding:10px 14px">
          <div class="pago-num" id="lab-pago-display" style="font-size:22px">S/0.00</div>
          <span class="pago-lbl">a pagar</span>
        </div>
      </div>
      <div class="fc full"><label>Observación</label><textarea id="lab-obs" rows="2"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-s" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-p" onclick="guardarLabor('${tipoTarea}','${tipoPago}')">Registrar</button>
    </div>
  `);
  calcularPagoLabor();
}

function calcularPagoLabor() {
  const sel = document.getElementById('lab-trab');
  const tareas = parseInt(document.getElementById('lab-tareas')?.value) || 0;
  const display = document.getElementById('lab-pago-display');
  if(!sel || !display) return;
  // Lee el pago desde data-pago del option seleccionado (viene del backend filtrado)
  const selectedOption = sel.options[sel.selectedIndex];
  const pagoPorTarea = parseFloat(selectedOption?.dataset?.pago || 0);
  const pago = pagoPorTarea * tareas;
  display.textContent = 'S/' + pago.toFixed(2);
}

async function guardarLabor(tipoTarea, tipoPago) {
  const idTrab  = document.getElementById('lab-trab')?.value;
  const fecha   = document.getElementById('lab-fecha')?.value;
  const tareas  = parseInt(document.getElementById('lab-tareas')?.value) || 0;
  const parcela = document.getElementById('lab-parcela')?.value;
  const obs     = document.getElementById('lab-obs')?.value;
  if(!idTrab || !fecha) { mostrarToast('Complete los campos obligatorios'); return; }
  const body = {
    trabajador: { idTrab: parseInt(idTrab) },
    fecAsist: fecha,
    presente: true,
    tipoTarea: tipoTarea,
    tareasCompletadas: tareas,
    observacionSupervisor: parcela + (obs ? ' — ' + obs : '')
  };
  try {
    const r = await fetch('/api/asistencias', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(r.ok) {
      mostrarToast('Labor registrada correctamente');
      cerrarModal();
      await cargarDatosIniciales();
      const seccionId = {TRANSPLANTE:'transplante', SACA:'saca-arroz', CARGA:'carga-arroz'}[tipoTarea];
      cargarLabores(tipoTarea, seccionId);
    } else mostrarToast('Error al registrar');
  } catch(e) { mostrarToast('Sin conexión'); }
}
async function cargarLaboresRiego() {
  try {
    const rawData = await apiFetch('/api/asistencias?tipoTarea=RIEGO');
    const data = (rawData || []).filter(a => a.trabajador && a.trabajador.activo);
    const lista = document.getElementById('lista-riego-hoy');
    if(!lista) return;
    if(!data.length){
      lista.innerHTML = `<p style="color:var(--ts);font-size:13px;text-align:center;padding:12px">No hay riegos registrados.</p>`;
      return;
    }
    let totalTareas = 0;
    lista.innerHTML = `
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--bg)">
          <th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--ts)">Fecha</th>
          <th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--ts)">Trabajador</th>
          <th style="padding:8px 12px;text-align:center;font-size:11px;text-transform:uppercase;color:var(--ts)">Tareas</th>
          <th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--ts)">Parcela/Obs.</th>
        </tr></thead>
        <tbody>
          ${data.map(a => {
            const trab = trabajadores.find(t => t.id === (a.trabajador?.idTrab || a.idTrabajador)) || {};
            totalTareas += (a.tareasCompletadas||0);
            return `<tr style="border-bottom:1px solid rgba(226,232,223,.5)">
              <td style="padding:9px 12px;font-size:13px">${a.fecAsist||'—'}</td>
              <td style="padding:9px 12px"><div class="c-nombre"><div class="mini-av">${(trab.nombre||'?')[0]}</div><strong>${trab.nombre||'—'} ${trab.apellido||''}</strong></div></td>
              <td style="padding:9px 12px;text-align:center;font-weight:700;color:var(--v2)">${a.tareasCompletadas||0}</td>
              <td style="padding:9px 12px;font-size:12px;color:var(--ts)">${a.observacionSupervisor||'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="padding:10px 16px;text-align:right;font-size:13px;color:var(--ts);border-top:1px solid var(--borde)">
        Total tareas: <strong style="color:var(--v2)">${totalTareas}</strong>
      </div>`;
  } catch(e) {
    const lista = document.getElementById('lista-riego-hoy');
    if(lista) lista.innerHTML = `<p style="color:red;padding:12px;font-size:13px">Error al cargar riegos.</p>`;
  }
}

function abrirModalEspecial(tipo) {
  const esJornal = tipo === 'jornal';
  const tps = esJornal ? ['jornal'] : ['por_saco'];
  const personal = trabajadores.filter(t => tps.includes((t.tipoPago || '').toLowerCase()));
  const opsTrab = personal.map(t => `<option value="${t.id}">${t.nombre} ${t.apellido}</option>`).join('');
  
  if(!personal.length) return mostrarToast('No hay personal de este tipo disponible.');

  abrirModal(`
    <h3 class="modal-tit">Registrar Labor: ${esJornal ? 'Jornal' : 'Por Saco'}</h3>
    <div class="form-grid">
      <div class="fc"><label>Fecha</label><input type="date" id="esp-fecha" value="${new Date().toLocaleDateString('en-CA')}"></div>
      <div class="fc"><label>Trabajador</label><select id="esp-trab">${opsTrab}</select></div>
      ${esJornal ? 
        `<div class="fc"><label>Días / Jornales</label><input type="number" id="esp-cant" value="1" min="1"></div>` :
        `<div class="fc"><label>Cantidad de Sacos</label><input type="number" id="esp-cant" value="1" min="1"></div>`
      }
      <div class="fc full"><label>Observaciones / Detalles</label><textarea id="esp-obs" placeholder="Ej: Parcela A..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-s" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-p" onclick="guardarLaborEspecial('${tipo}')">Registrar</button>
    </div>
  `);
}

async function guardarLaborEspecial(tipo) {
  const esJornal = tipo === 'jornal';
  const idTrab = document.getElementById('esp-trab').value;
  if(!idTrab) { mostrarToast('Seleccione un trabajador'); return; }
  
  const body = {
    trabajador: { idTrab: parseInt(idTrab) },
    fecAsist: document.getElementById('esp-fecha').value,
    presente: true,
    tipoTarea: null,
    observacionSupervisor: document.getElementById('esp-obs').value
  };
  if (esJornal) body.tareasCompletadas = parseInt(document.getElementById('esp-cant').value) || 1;
  else body.sacosCosechados = parseInt(document.getElementById('esp-cant').value) || 0;

  try {
    const r = await apiFetch('/api/asistencias', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(r) { mostrarToast('Registro guardado correctamente'); cerrarModal(); await cargarDatosIniciales(); if(modActivo==='verificar-tareas') listarVerificarTareas(); }
    else mostrarToast('Error al registrar');
  } catch(e) { mostrarToast('Sin conexión'); }
}
