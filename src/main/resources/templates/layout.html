<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroMoyobamba — Sistema Agrícola Integral</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --v0:#071a07; --v1:#0f2d0f; --v2:#1a5c1a; --v3:#2d8b2d; --v4:rgba(45,139,45,.15);
  --d1:#c8920a; --d2:#f0b429; --d3:#fef3c7;
  --bg:#f0f4ef; --card:#ffffff; --borde:#e2e8df;
  --tx:#1a2a1a; --ts:#6b7e6b;
  --sw:272px; --th:62px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --r1: #dc2626; --b1:#2563eb; --p1:#7c3aed;
  --z-sidebar: 1000; --z-modal: 1300;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;overflow-x:hidden}

/* ── LOGIN ── */
#pantalla-login{display:flex;min-height:100vh;width:100%;background:var(--v1);position:fixed;inset:0;z-index:9999;align-items:stretch}
.login-izq{flex:1;background:linear-gradient(145deg,var(--v0) 0%,var(--v2) 60%,var(--v3) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;position:relative;overflow:hidden}
.login-izq::before{content:'🌾';font-size:300px;position:absolute;opacity:.04;top:-40px;right:-60px;line-height:1}
.login-izq .marca{text-align:center;position:relative}
.login-izq .logo-grande{font-size:64px;margin-bottom:20px;display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,.4))}
.login-izq h1{font-family:'Playfair Display',serif;font-size:36px;color:#fff;margin-bottom:10px;line-height:1.2}
.login-izq .sub-marca{font-size:14px;color:rgba(255,255,255,.5);font-weight:300;letter-spacing:.05em}
.login-izq .info-campo{margin-top:48px;display:flex;flex-direction:column;gap:14px}
.info-chip{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:12px 18px;border-radius:12px;color:rgba(255,255,255,.8);font-size:13px}
.info-chip span{font-size:22px;flex-shrink:0}
.login-der{width:440px;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:60px 48px}
.login-der h2{font-family:'Playfair Display',serif;font-size:28px;color:var(--tx);margin-bottom:6px}
.login-der .sub-login{font-size:13px;color:var(--ts);margin-bottom:36px}
.login-campo{margin-bottom:18px}
.login-campo label{display:block;font-size:11px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.login-campo input,.login-campo select{width:100%;padding:12px 14px;border:1.5px solid var(--borde);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--tx);outline:none;transition:.2s;background:var(--bg)}
.login-campo input:focus,.login-campo select:focus{border-color:var(--v3);box-shadow:0 0 0 3px rgba(45,139,45,.12);background:#fff}
.btn-login{width:100%;padding:14px;background:var(--v2);color:#fff;border:none;border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px;letter-spacing:.02em}
.btn-login:hover{background:var(--v3);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,92,26,.35)}
.roles-demo{margin-top:28px;padding:16px;background:var(--bg);border-radius:12px;border:1px solid var(--borde)}
.roles-demo p{font-size:11px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.role-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid;transition:.15s;margin:3px}
.role-btn:hover{transform:translateY(-1px)}
.rb-admin{background:rgba(200,146,10,.1);border-color:var(--d1);color:var(--d1)}
.rb-super{background:rgba(37,99,235,.08);border-color:#2563eb;color:#2563eb}
.rb-ing{background:rgba(124,58,237,.08);border-color:#7c3aed;color:#7c3aed}
.rb-trab{background:rgba(45,139,45,.1);border-color:var(--v3);color:var(--v2)}
#login-error{display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px}

/* ── SIDEBAR ── */
#pantalla-app{display:none}
.sidebar{width:var(--sw);background:var(--v0);min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:var(--z-sidebar);transition:.3s}
.sidebar-logo{padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
.logo-ico{width:42px;height:42px;background:linear-gradient(135deg,var(--v3),var(--d1));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo-tx h2{font-family:'Playfair Display',serif;font-size:14px;color:#fff;line-height:1.3}
.logo-tx span{font-size:10px;color:rgba(255,255,255,.35);font-weight:300}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.nav-sec{padding:10px 18px 3px;font-size:9.5px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.2em;text-transform:uppercase;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;transition:.2s;border-left:3px solid transparent;text-decoration:none;color:rgba(255,255,255,.58);font-size:13px;font-weight:400;margin:1px 0;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.055);color:rgba(255,255,255,.88);border-left-color:rgba(255,255,255,.15)}
.nav-item.activo{background:rgba(45,139,45,.22);color:#fff;border-left-color:var(--d2);font-weight:500}
.nav-item.activo .nbadge{background:var(--d2);color:var(--v0)}
.nav-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.role-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:auto;letter-spacing:.05em;text-transform:uppercase}
.rt-admin{background:rgba(200,146,10,.25);color:var(--d2)}
.rt-super{background:rgba(59,130,246,.2);color:#60a5fa}
.rt-ing{background:rgba(124,58,237,.2);color:#a78bfa}
.rt-trab{background:rgba(45,139,45,.2);color:#86efac}
.sidebar-user{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px}
.u-avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--v2),var(--d1));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700;color:#fff}
.u-info{flex:1}
.u-name{font-size:12.5px;font-weight:600;color:#fff;display:block}
.u-rol{font-size:10px;color:rgba(255,255,255,.38)}
.btn-salir{background:none;border:none;cursor:pointer;font-size:15px;opacity:.45;transition:.2s;padding:4px}
.btn-salir:hover{opacity:1}

/* ── APP SHELL ── */
#pantalla-app{display:none;flex:1}
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--th);background:var(--card);border-bottom:1px solid var(--borde);display:flex;align-items:center;padding:0 26px;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--borde)}
.topbar-titulo{flex:1}
.topbar-titulo h1{font-family:'Playfair Display',serif;font-size:21px;color:var(--tx)}
.breadcrumb{font-size:11.5px;color:var(--ts);margin-top:1px}
.topbar-acc{display:flex;align-items:center;gap:10px}
.ico-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--borde);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:.2s;text-decoration:none}
.ico-btn:hover{background:var(--bg);border-color:var(--v3)}
.area{flex:1;padding:26px;overflow-y:auto}
.modulo{display:none}
.modulo.activo{display:block;animation:entrar .22s ease}

/* Botón Menú Móvil */
.menu-btn-movil{display:none;font-size:24px;background:none;border:none;color:var(--tx);cursor:pointer;padding:5px}

/* Overlay para cerrar menú en móvil */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:900;backdrop-filter:blur(2px)}

@keyframes entrar{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── COMPONENTES ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.kpi-card{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:var(--sh);border:1px solid var(--borde);display:flex;align-items:center;gap:14px;transition:.2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.kpi-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.ki-verde{background:rgba(45,139,45,.11)} .ki-dorado{background:rgba(200,146,10,.11)} .ki-azul{background:rgba(37,99,235,.1)} .ki-rojo{background:rgba(220,38,38,.09)} .ki-purp{background:rgba(124,58,237,.1)}
.kpi-num{font-family:'Playfair Display',serif;font-size:28px;color:var(--tx);line-height:1;display:block}
.kpi-lbl{font-size:11.5px;color:var(--ts);margin-top:3px;display:block}
.kpi-var{font-size:10.5px;font-weight:600;margin-top:1px}

.pos{color:#16a34a} .neg{color:#dc2626}

.card{background:var(--card);border-radius:14px;box-shadow:var(--sh);border:1px solid var(--borde);margin-bottom:18px;overflow:visible}
.card-hdr{padding:16px 20px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.card-hdr h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--tx)}
.card-hdr .sub{font-size:12.5px;color:var(--ts)}
.tabla-wrap{overflow-x:auto;overflow-y:visible}
table{width:100%;border-collapse:collapse}
thead th{background:var(--bg);padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--borde);white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid rgba(226,232,223,.5);font-size:13.5px;color:var(--tx)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(45,139,45,.025)}
.c-nombre{display:flex;align-items:center;gap:9px}
.mini-av{width:29px;height:29px;border-radius:50%;background:linear-gradient(135deg,var(--v2),var(--v3));display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;flex-shrink:0}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.bv{background:rgba(22,163,74,.09);color:#16a34a}.bv::before{background:#16a34a}
.br{background:rgba(220,38,38,.09);color:#dc2626}.br::before{background:#dc2626}
.ba{background:rgba(234,179,8,.1);color:#a16207}.ba::before{background:#ca8a04}
.bb{background:rgba(37,99,235,.09);color:#2563eb}.bb::before{background:#3b82f6}
.bg{background:rgba(107,114,128,.09);color:#6b7280}.bg::before{background:#9ca3af}
.bp{background:rgba(124,58,237,.09);color:#7c3aed}.bp::before{background:#7c3aed}

.tbtn{padding:5px 9px;border-radius:6px;border:1px solid var(--borde);background:var(--card);font-size:11.5px;cursor:pointer;transition:.15s;font-family:'IBM Plex Sans',sans-serif;color:var(--tx)}
.tbtn:hover{background:var(--bg);border-color:var(--v3);color:var(--v2)}
.tbtn.peligro:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.tbtn.success:hover{background:#f0fdf4;border-color:#86efac;color:#16a34a}

.btn-p{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--v2);color:#fff;border:none;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-p:hover{background:var(--v3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,92,26,.3)}
.btn-s{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);color:var(--tx);border:1px solid var(--borde);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;cursor:pointer;transition:.2s}
.btn-s:hover{background:var(--bg);border-color:var(--v3)}
.btn-d{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(200,146,10,.12);color:var(--d1);border:1.5px solid var(--d1);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-d:hover{background:rgba(200,146,10,.22)}
.btn-b{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(37,99,235,.1);color:#2563eb;border:1.5px solid #2563eb;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-b:hover{background:rgba(37,99,235,.2)}
.btn-pu{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(124,58,237,.1);color:#7c3aed;border:1.5px solid #7c3aed;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-pu:hover{background:rgba(124,58,237,.2)}

.busq{position:relative}
.busq-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.busq input{padding:7px 11px 7px 30px;border:1px solid var(--borde);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;color:var(--tx);background:var(--bg);outline:none;width:200px;transition:.2s}
.busq input:focus{background:var(--card);border-color:var(--v3);box-shadow:0 0 0 3px rgba(45,139,45,.1);width:240px}
.htools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(7,26,7,.55);backdrop-filter:blur(3px);z-index:1300;align-items:center;justify-content:center}
.modal-ov.vis{display:flex}
.modal{background:var(--card);border-radius:16px;padding:26px;width:90%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mEnt .22s ease;position:relative;z-index:1301}
.modal.lg{max-width:740px}
@keyframes mEnt{from{opacity:0;transform:scale(.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-tit{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:18px;color:var(--tx)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.form-grid .full{grid-column:1/-1}
.fc label{display:block;font-size:10.5px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.fc input,.fc select,.fc textarea{width:100%;padding:9px 11px;border:1.5px solid var(--borde);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;color:var(--tx);outline:none;transition:.2s;background:var(--card)}
.fc input:focus,.fc select:focus,.fc textarea:focus{border-color:var(--v3);box-shadow:0 0 0 3px rgba(45,139,45,.1)}
.fc textarea{resize:vertical;min-height:80px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:4px;padding-top:16px;border-top:1px solid var(--borde)}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--v0);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;display:none;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tEnt .3s ease}
@keyframes tEnt{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.vis{display:flex}

/* ── Menú de acciones 3 puntos ── */
.acc-wrap{position:relative;display:inline-flex;overflow:visible}
.acc-wrap.open-wrap{z-index:1100}
.acc-btn{background:none;border:1.5px solid var(--borde);border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--ts);display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1}
.acc-btn:hover{background:var(--bg);border-color:var(--v3);color:var(--v2)}
.acc-menu{display:none;position:fixed;background:#fff;border:1px solid var(--borde);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:1200;min-width:150px;overflow:hidden}
.acc-menu.open{display:block}
.acc-menu a{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;color:var(--tx);cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:'IBM Plex Sans',sans-serif}
.acc-menu a:hover{background:var(--bg)}
.acc-menu a.rojo{color:#dc2626}
.acc-menu a.rojo:hover{background:#fef2f2}
.acc-sep{height:1px;background:var(--borde);margin:3px 0}

/* Barra herramientas de filtro*/
input[type="date"],input[type="time"]{padding:10px 12px;border:1.5px solid var(--borde);border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;outline:none;background:var(--bg);color:var(--tx);min-height:42px;width:auto;transition:.2s;cursor:text}
input[type="date"]:focus,input[type="time"]:focus{border-color:var(--v3);background:#fff;box-shadow:0 0 0 3px rgba(45,139,45,.1)}

/* Estilo para que el selector de hora se sienta como un campo de texto */
input[type="time"]::-webkit-calendar-picker-indicator {
  cursor: pointer;
  filter: invert(30%) sepia(50%) saturate(500%) hue-rotate(80deg);
}

select.filtro{padding:7px 10px;border:1px solid var(--borde);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;outline:none;background:var(--bg);color:var(--tx)}

/* Pago calculado */
.pago-display{background:linear-gradient(135deg,rgba(45,139,45,.08),rgba(200,146,10,.06));border:2px solid rgba(45,139,45,.2);border-radius:12px;padding:16px 20px;text-align:center;margin:16px 0}
.pago-display .pago-num{font-family:'Playfair Display',serif;font-size:36px;color:var(--v2);font-weight:700}
.pago-display .pago-lbl{font-size:12px;color:var(--ts);display:block;margin-top:2px}

/* Tarea cards trabajador */
.tareas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:20px}
.tarea-card{border:2px solid var(--borde);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg)}
.tarea-card:hover{border-color:var(--v3);background:rgba(45,139,45,.04);transform:translateY(-2px)}
.tarea-card.sel{border-color:var(--v3);background:rgba(45,139,45,.1);box-shadow:0 0 0 3px rgba(45,139,45,.15)}
.tarea-card .t-ico{font-size:32px;margin-bottom:8px}
.tarea-card .t-nom{font-size:13px;font-weight:600;color:var(--tx)}
.tarea-card .t-pay{font-size:11.5px;color:var(--ts);margin-top:3px}

/* Reportes */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:20px}
.rep-item{border:1.5px solid var(--borde);border-radius:12px;padding:20px;cursor:pointer;transition:.2s;background:var(--bg)}
.rep-item:hover{border-color:var(--v3);background:rgba(45,139,45,.04);transform:translateY(-2px);box-shadow:var(--sh)}
.rep-item .r-ico{font-size:26px;margin-bottom:10px}
.rep-item h4{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}
.rep-item p{font-size:12px;color:var(--ts)}
.rep-item .r-tag{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(45,139,45,.1);color:var(--v2)}

/* Chart barras */
.chart-wrap{display:flex;flex-direction:column;gap:9px;padding:14px 20px}
.ch-fila{display:flex;align-items:center;gap:11px;font-size:12.5px}
.ch-lbl{width:120px;color:var(--ts);flex-shrink:0;font-size:12px}

<script>
// Lógica de interfaz responsive
function toggleSidebar() {
  const sb = document.getElementById('sidebar');

// ═══════════════════════════════════════════════════════
// DATOS & ESTADO
// ═══════════════════════════════════════════════════════
const TARIFAS = {
  TRANSPLANTE:  {tipo:'fijo',  monto:50,   unidad:'tarea',   ico:''},
  SACA:         {tipo:'fijo',  monto:50,   unidad:'tarea',   ico:''},
  CARGA:        {tipo:'fijo',  monto:50,   unidad:'tarea',   ico:''},

};

let SESSION = { rol: 'ADMIN', nombre: 'Cargando...', avatar: 'U' };
let modActivo = '';

// ── Helpers de permisos ──
const isAdmin = () => SESSION.rol === 'ADMIN';
const btnAdmin = (html) => isAdmin() ? html : '';

// ── Menú 3 puntos ──
function toggleMenu(btn) {
  const menu = btn.nextElementSibling;
  const wrap = btn.parentElement;
  // Cierra todos los demás menús abiertos
  document.querySelectorAll('.acc-menu.open').forEach(m => { 
    if(m !== menu) {
      m.classList.remove('open');
      m.parentElement.classList.remove('open-wrap');
    }
  });
  
  const opening = !menu.classList.contains('open');
  menu.classList.toggle('open', opening);
  wrap.classList.toggle('open-wrap', opening);

  if (!opening) { menu.style.left = ''; menu.style.top = ''; return; }
  menu.classList.add('open');
  positionAccMenu(menu, btn);
}

function positionAccMenu(menu, btn) {
  menu.style.visibility = 'hidden';
  menu.style.left = '0';
  menu.style.top = '0';
  const btnRect = btn.getBoundingClientRect();
  const menuRect = menu.getBoundingClientRect();
  const padding = 8;
  let left = btnRect.right - menuRect.width;
  if (left < padding) left = padding;
  if (left + menuRect.width > window.innerWidth - padding) left = window.innerWidth - menuRect.width - padding;
  let top = btnRect.bottom + 6;
  if (top + menuRect.height > window.innerHeight - padding) {
    top = btnRect.top - menuRect.height - 6;
    if (top < padding) top = padding;
  }
  menu.style.left = `${left}px`;
  menu.style.top = `${top}px`;
  menu.style.visibility = '';
}
// Clic fuera cierra todos los menús
document.addEventListener('click', function(e) {
  if(!e.target.closest('.acc-wrap')) {
    document.querySelectorAll('.acc-menu.open').forEach(m => {
      m.classList.remove('open');
      m.parentElement.classList.remove('open-wrap');
    });
  }
});

// Datos reales desde PostgreSQL (se cargan al iniciar)
let trabajadores = [];
let asistencias  = [];

// Datos que se mantienen locales (no tienen tabla en BD aún)
let plagas = [
  {id:1,nombre:'Pyricularia oryzae (Quemado)',nivel:'ALTO',detectado:'2026-05-20',parcela:'A',producto:'Tricyclazole 75%',dosis:'0.5 kg/ha',notas:'Aplicar en horas de menor temperatura.',ico:''},
  {id:2,nombre:'Sogata (Tagosodes orizicolus)',nivel:'MEDIO',detectado:'2026-05-18',parcela:'B',producto:'Imidacloprid 35%',dosis:'0.35 L/ha',notas:'Control biológico disponible.',ico:''},
  {id:3,nombre:'Gusano cogollero',nivel:'BAJO',detectado:'2026-05-15',parcela:'C',producto:'Clorpirifos 48%',dosis:'1 L/ha',notas:'Presencia menor al umbral económico.',ico:''},
];

let movCaja = [];
let materiales = [];

async function cargarMateriales() {
  const cont = document.getElementById('materiales-contenedor');
  if (cont) cont.innerHTML = '<p style="color:var(--ts)">Cargando materiales...</p>';
  const datos = await apiFetch('/api/materiales');
  materiales = Array.isArray(datos) ? datos.map(m => ({
    id: m.idMat,
    nombre: m.nomMat,
    tipo: m.tipoMat,
    stockActual: parseFloat(m.stockActual || 0),
    stockMinimo: parseFloat(m.stockMinimo || 0),
    unidad: m.unidadMedida || 'unidad'
  })) : [];
  renderMateriales(document.getElementById('mat-search')?.value || '');
}

function renderMateriales(filtro = '') {
  const cont = document.getElementById('materiales-contenedor');
  if (!cont) return;
  const query = (filtro || '').toString().trim().toLowerCase();
  const lista = materiales.filter(m =>
    m.nombre.toLowerCase().includes(query) ||
    (m.tipo || '').toLowerCase().includes(query)
  );
  if (!lista.length) {
    cont.innerHTML = '<p style="color:var(--ts)">No se encontraron materiales para la búsqueda.</p>';
    return;
  }
  const bajos = lista.filter(m => m.stockActual <= m.stockMinimo);
  const advertencia = bajos.length > 0 ? `
    <div style="padding:16px 18px;margin-bottom:14px;background:${bajos.some(m=>m.stockActual<=0)?'rgba(254,226,226,.95)':'rgba(255,251,235,.95)'};border-left:5px solid ${bajos.some(m=>m.stockActual<=0)?'#dc2626':'#f59e0b'};color:${bajos.some(m=>m.stockActual<=0)?'#991b1b':'#713f12'};box-shadow:0 1px 6px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:12px">
      <div style="font-size:20px;line-height:1.1">⚠️</div>
      <div>
        <div style="font-weight:700;margin-bottom:4px">${bajos.some(m=>m.stockActual<=0)?'Material(es agotado(s))':'Stock bajo detectado'}</div>
        <div style="font-size:13px;line-height:1.6">${bajos.length} material${bajos.length===1?'':'es'} con stock bajo o crítico. ${bajos.some(m=>m.stockActual<=0)?'Incluye al menos un material agotado.':'Revise los niveles antes de usar.'}</div>
      </div>
    </div>
  ` : '';
  cont.innerHTML = `${advertencia}
    <table>
      <thead><tr><th>Material</th><th>Categoría</th><th>Stock</th><th>Unidad</th><th>Nivel</th><th>Acción</th></tr></thead>
      <tbody>
        ${lista.map(m => {
          const nivel = m.stockActual <= m.stockMinimo
            ? '<span class="badge br">Stock Bajo</span>'
            : '<span class="badge bv">Suficiente</span>';
          const color = m.stockActual <= m.stockMinimo ? '#ca8a04' : 'var(--v2)';
          return `
            <tr>
              <td><div class="c-nombre"><strong>${m.nombre}</strong></div></td>
              <td>${m.tipo || 'Sin categoría'}</td>
              <td style="font-weight:700;color:${color}">${m.stockActual.toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:2})}</td>
              <td>${m.unidad}</td>
              <td>${nivel}</td>
              <td style="white-space:nowrap">
                <input id="mat-cant-${m.id}" type="number" min="1" value="1" style="width:70px;padding:6px;border:1px solid var(--borde);border-radius:8px;margin-right:6px" />
                <button class="btn-s" onclick="usarMaterial(${m.id})">Usar</button>
                <button class="btn-p" onclick="agregarMaterial(${m.id})">Agregar</button>
              </td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function abrirModalNuevoMaterial(){
  abrirModal(`
    <h3 class="modal-tit">Nuevo Material</h3>
    <form id="form-material" onsubmit="guardarNuevoMaterial(event)">
      <div class="form-grid">
        <div class="fc"><label>Nombre</label><input type="text" id="mat-nombre" required></div>
        <div class="fc"><label>Categoría</label><input type="text" id="mat-categoria" placeholder="Ej: Fertilizante"></div>
        <div class="fc"><label>Stock actual</label><input type="number" min="0" step="0.01" id="mat-stock" value="0" required></div>
        <div class="fc"><label>Stock mínimo</label><input type="number" min="0" step="0.01" id="mat-stockmin" value="0" required></div>
        <div class="fc"><label>Unidad</label><input type="text" id="mat-unidad" placeholder="Ej: kg, sacos, litros"></div>
      </div>
      <div class="modal-foot"><button type="button" class="btn-s" onclick="cerrarModal()">Cancelar</button><button type="submit" class="btn-p">Crear Material</button></div>
    </form>
  `);
}

async function guardarNuevoMaterial(event){
  event.preventDefault();
  const body = {
    nomMat: document.getElementById('mat-nombre').value.trim(),
    tipoMat: document.getElementById('mat-categoria').value.trim(),
    stockActual: parseFloat(document.getElementById('mat-stock').value) || 0,
    stockMinimo: parseFloat(document.getElementById('mat-stockmin').value) || 0,
    unidadMedida: document.getElementById('mat-unidad').value.trim() || 'unidad'
  };
  try {
    const r = await fetch('/api/materiales', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if(r.ok){
      mostrarToast('Material creado con éxito');
      cerrarModal();
      await cargarMateriales();
    } else {
      const texto = await r.text();
      mostrarToast('No se pudo crear material: ' + texto);
    }
  } catch(e){
    mostrarToast('Error al crear material');
  }
}

function buscarMateriales() {
  const filtro = document.getElementById('mat-search')?.value || '';
  renderMateriales(filtro);
}

async function usarMaterial(id) {
  const input = document.getElementById(`mat-cant-${id}`);
  let cantidad = Number(input?.value || 1);
  if (!cantidad || cantidad < 1) cantidad = 1;
  const mat = materiales.find(x => x.id === id);
  if (!mat) return mostrarToast('Material no encontrado');
  const nuevoStock = mat.stockActual - cantidad;
  if (nuevoStock < 0) return mostrarToast('No hay suficiente stock disponible');
  const res = await apiFetch(`/api/materiales/${id}/stock`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ nuevoStock, observacion: `Uso de material (-${cantidad})` })
  });
  if (res) {
    mat.stockActual = parseFloat(res.stockActual || nuevoStock);
    mostrarToast(`Se descontaron ${cantidad} ${mat.unidad} de ${mat.nombre}`);
    renderMateriales(document.getElementById('mat-search')?.value || '');
  }
}

async function agregarMaterial(id) {
  const input = document.getElementById(`mat-cant-${id}`);
  let cantidad = Number(input?.value || 1);
  if (!cantidad || cantidad < 1) cantidad = 1;
  const mat = materiales.find(x => x.id === id);
  if (!mat) return mostrarToast('Material no encontrado');
  const nuevoStock = mat.stockActual + cantidad;
  const res = await apiFetch(`/api/materiales/${id}/stock`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ nuevoStock, observacion: `Ingreso de material (+${cantidad})` })
  });
  if (res) {
    mat.stockActual = parseFloat(res.stockActual || nuevoStock);
    mostrarToast(`Se agregaron ${cantidad} ${mat.unidad} a ${mat.nombre}`);
    renderMateriales(document.getElementById('mat-search')?.value || '');
  }
}

// ── Utilidad para llamar a la API ──
async function apiFetch(url, options={}) {
  try {
    const r = await fetch(url, options);
    if (r.status === 401) { logout(); return null; }
    if (!r.ok) {
      const body = await r.text();
      mostrarToast('Error en servidor: ' + r.status + ' ' + body);
      return null;
    }
    return await r.json();
  } catch(e) {
    mostrarToast('Sin conexión con el servidor');
    return null;
  }
}

// ── Cargar datos reales de BD al iniciar ──
async function cargarDatosIniciales() {
  const [trabs, asists] = await Promise.all([
    apiFetch('/api/trabajadores'),
    apiFetch('/api/asistencias')
  ]);
  if (trabs)  trabajadores = trabs.map(t => ({
    id:          t.idTrab,
    nombre:      t.nomTrab,
    apellido:    t.apeTrab,
    dni:         t.dniTrab,
    cargo:       t.cargoNombre || 'Sin cargo',
    cargoId:     t.cargoId,
    tipoPago:    t.tipoPago,
    sueldoDia:   t.sueldoDia,
    pagoPorSaco: t.pagoPorSaco,
    pagoPorTarea:t.pagoPorTarea,
    activo:      true
  }));
  if (asists) asistencias = asists.map(a => ({
    id:          a.idAsist,
    trabId:      a.trabajador?.idTrab,
    fecAsist:    a.fecAsist,
    fecha:       a.fecAsist,
    tipoTarea:   a.tipoTarea || 'DIA',
    presente:    a.presente,
    estado:      a.estadoAprobacion || 'PENDIENTE',
    hora:        a.horaEntrada || '06:00',
    sacos:       a.sacosCosechados,
    tareasCompletadas: a.tareasCompletadas || 0,
    observacion: a.observacionSupervisor || ''
  }));
  // Aplicar overrides locales (persistencia offline: aprobaciones/observaciones/eliminaciones)
  applyAsistOverrides();
  // Cargar incidencias desde servidor si existe endpoint
  await cargarIncidencias();
}


// ----------------------- Persistencia local de cambios en asistencias -----------------------
function _loadAsistOverrides(){
  try{ return JSON.parse(localStorage.getItem('asi_over')||'{}'); }catch(e){ return {}; }
}
function _saveAsistOverrides(m){
  try{ localStorage.setItem('asi_over', JSON.stringify(m)); }catch(e){ console.warn('No se pudo guardar overrides', e); }
}
function saveAsistOverride(id, obj){
  const m = _loadAsistOverrides();
  m[id] = Object.assign({}, m[id]||{}, obj);
  _saveAsistOverrides(m);
}
function removeAsistOverride(id){
  const m = _loadAsistOverrides();
  if(m.hasOwnProperty(id)) { delete m[id]; _saveAsistOverrides(m); }
}
function applyAsistOverrides(){
  const m = _loadAsistOverrides();
  if(!asistencias || !Array.isArray(asistencias)) return;
  // Aplicar a la lista actual
  Object.keys(m).forEach(k => {
    const id = Number(k);
    const ov = m[k];
    const ix = asistencias.findIndex(x => x.id === id);
    if(ov.deleted){
      if(ix !== -1) asistencias.splice(ix,1);
    } else if(ix !== -1){
      asistencias[ix] = Object.assign({}, asistencias[ix], ov);
    } else {
      // Si no existe localmente, ignorar
    }
  });
}

async function verificarSesionServidor() {
  try {
    const r = await fetch('/api/auth/me');
    if(r.ok) {
      const data = await r.json();
      SESSION = {
        rol: data.rol || 'ADMIN',
        nombre: data.nombre || 'Usuario',
        avatar: (data.nombre ? data.nombre[0] : 'U').toUpperCase(),
        username: data.username
      };
    }
  } catch(e) {
    console.log("No se pudo mapear detalles personalizados de sesión, usando valores por defecto.");
  }
}

function iniciarApp(){
  document.getElementById('u-av').textContent = SESSION.avatar;
  document.getElementById('u-name').textContent = SESSION.nombre;
  document.getElementById('u-rol').textContent = rolLabel(SESSION.rol);

  // Badge de rol en topbar
  const badge = document.getElementById('topbar-rol-badge');
  if(badge){
    const colores = {ADMIN:'background:rgba(200,146,10,.15);color:#c8920a', SUPERVISOR:'background:rgba(37,99,235,.1);color:#2563eb', INGENIERO:'background:rgba(124,58,237,.1);color:#7c3aed', TRABAJADOR:'background:rgba(45,139,45,.12);color:var(--v2)'};
    badge.style.cssText = colores[SESSION.rol] || colores.TRABAJADOR;
    badge.textContent = (SESSION.rol==='ADMIN' ? '🔐 ' : '') + rolLabel(SESSION.rol);
  }

  construirSidebar();
  const primerMod = getModulosRol()[0].items[0].id;
  irA(primerMod);
}

function rolLabel(r){
  return {ADMIN:'Administrador',SUPERVISOR:'Supervisor',INGENIERO:'Ingeniero Agrónomo',TRABAJADOR:'Trabajador / Operador'}[r]||r;
}

function getModulosRol(){
  const ROL = SESSION.rol;
  const todos = [
    {sec:'Principal', items:[
      {id:'dashboard',ico:'📊',label:'Dashboard'},
    ]},
    {sec:'Mi Trabajo', items:[
      {id:'mi-asistencia',ico:'✅',label:'Marcar Asistencia'},
    ]},
    {sec:'Supervisión', items:[
      {id:'verificar-tareas',ico:'🔍',label:'Verificar Tareas'},
      {id:'incidencias',ico:'⚠️',label:'Incidencias'},
      {id:'resumen-diario',ico:'📋',label:'Resumen del Día'},
    ]},
    {sec:'Agronomía', items:[
      {id:'control-plagas',ico:'🦠',label:'Control de Plagas'},
      {id:'calendario-fitosanitario',ico:'📅',label:'Calendario Fitosanitario'},
      {id:'recomendaciones',ico:'🧪',label:'Recomendaciones'},
    ]},
    {sec:'Administración', items:[
      {id:'trabajadores',ico:'👥',label:'Personal'},
      {id:'caja',ico:'💰',label:'Caja y Movimientos'},
      {id:'reportes',ico:'📈',label:'Reportes'},
    ]},
    {sec:'Producción Arrocera', items:[
      {id:'transplante',ico:'🌱',label:'Transplante'},
      {id:'saca-arroz',ico:'🌾',label:'Saca de Arroz'},
      {id:'carga-arroz',ico:'📦',label:'Carga de Arroz'},
      {id:'movilidad',ico:'⛽',label:'Gasolina'},
    ]},
    {sec:'Campo', items:[
      {id:'riego',ico:'💧',label:'Riego'},
      {id:'materiales',ico:'📦',label:'Materiales'},
    ]},
  ];

  // Filtro por rol
  const PERMISOS = {
    TRABAJADOR: ['mi-asistencia'],
    SUPERVISOR: ['dashboard','verificar-tareas','incidencias','resumen-diario','riego','materiales','transplante','saca-arroz','carga-arroz','movilidad'],
    INGENIERO:  ['dashboard','control-plagas','calendario-fitosanitario','recomendaciones','transplante','saca-arroz','carga-arroz','movilidad'],
    ADMIN:      null, // todo
  };

  const permitidos = PERMISOS[ROL];
  return todos.flatMap(sec => {
    const its = sec.items.filter(i => !permitidos || permitidos.includes(i.id));
    return its.length ? [{sec:sec.sec, items:its}] : [];
  });
}

function construirSidebar(){
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML='';
  const mods = getModulosRol();
  mods.forEach(sec => {
    const d = document.createElement('div');
    d.className='nav-sec';
    d.textContent=sec.sec;
    nav.appendChild(d);
    sec.items.forEach(it => {
      const a = document.createElement('a');
      a.className='nav-item';
      a.id='nav-'+it.id;
      a.onclick = ()=>irA(it.id);
      a.innerHTML=`<span class="nav-ico">${it.ico}</span>${it.label}`;
      nav.appendChild(a);
    });
  });
}

function initDashboard(){
  document.getElementById('kpi-personal').textContent = trabajadores.length;
  let totalSacos = asistencias.reduce((acc,cur)=> acc + (cur.sacos||0), 0);
  document.getElementById('kpi-sacos').textContent = totalSacos;

  // KPI: pago estimado total
  let pagoTotal = 0;
  asistencias.forEach(a => {
    const trab = trabajadores.find(t => t.id === a.trabId);
    if(!trab) return;
    const tareas = a.tareasCompletadas || 0;
    if(trab.sueldoDia) pagoTotal += trab.sueldoDia;
    else if(trab.pagoPorTarea) pagoTotal += trab.pagoPorTarea * tareas;
    else if(trab.pagoPorSaco) pagoTotal += trab.pagoPorSaco * (a.sacos||0);
  });
  const kpiPago = document.getElementById('kpi-pago');
  if(kpiPago) kpiPago.textContent = 'S/' + pagoTotal.toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:0});

  // KPI: tareas pendientes de aprobar
  const pendientes = asistencias.filter(a => (a.estado||'PENDIENTE') === 'PENDIENTE').length;
  const kpiPend = document.getElementById('kpi-pendientes');
  if(kpiPend) kpiPend.textContent = pendientes;

  // ── Gráfico de sacos reales por semana del mes actual ──
  const hoy = new Date();
  const mes = hoy.getMonth(); const anio = hoy.getFullYear();
  const porSemana = [0, 0, 0, 0];
  asistencias.forEach(a => {
    if(!a.fecAsist) return;
    const d = new Date(a.fecAsist + 'T00:00:00');
    if(d.getMonth() === mes && d.getFullYear() === anio){
      const sem = Math.min(3, Math.floor((d.getDate() - 1) / 7));
      porSemana[sem] += (a.sacos || 0);
    }
  });
  const maxSacos = Math.max(...porSemana, 1);
  const semanas = ['Semana 1','Semana 2','Semana 3','Semana 4 (Actual)'];
  const colores = ['var(--v3)','var(--v3)','var(--v3)','var(--v2)'];
  const chart = document.getElementById('dash-chart-barras');
  if(chart){
    chart.innerHTML = porSemana.map((v,i) => `
      <div class="ch-fila">
        <span class="ch-lbl">${semanas[i]}</span>
        <div class="ch-bar-bg"><div class="ch-bar" style="width:${Math.round((v/maxSacos)*100)}%;background:${colores[i]}"></div></div>
        <span class="ch-val">${v} sacos</span>
      </div>`).join('');
  }

  // KPI alertas de plagas
  const alertas = plagas.filter(p=>p.nivel==='ALTO').length;
  const kpiAlerta = document.getElementById('kpi-alertas');
  if(kpiAlerta) kpiAlerta.textContent = alertas;

  // Caja resumen
  let htmlCaja = '';
  movCaja.forEach(m => {
    htmlCaja += `
      <div class="caja-row">
        <span class="caja-icon">${m.ico}</span>
        <div class="caja-desc"><strong>${m.desc}</strong><span>${formatFecha(m.fecha)}</span></div>
        <span class="caja-monto ${m.tipo==='INGRESO'?'ing':'eg'}">${m.tipo==='INGRESO'?'+':'-'} S/${m.monto}</span>
      </div>
    `;
  });
  document.getElementById('dash-caja-resumen').innerHTML = htmlCaja || '<p style="padding:16px;color:var(--ts);font-size:13px">Sin movimientos.</p>';
}

function listarTrabajadores(filtro=''){
  const contenedor = document.getElementById('segmentos-personal');
  if(!contenedor) return;

  const tipoFiltro = document.getElementById('filtro-trab-tipo')?.value || '';

  let filtrados = trabajadores.filter(t => {
    const matchTexto = t.nombre.toLowerCase().includes(filtro.toLowerCase()) ||
                       t.dni.includes(filtro);
    const matchTipo  = !tipoFiltro || t.tipoPago === tipoFiltro;
    return matchTexto && matchTipo;
  });

  const segmentos = [
    { key: 'transplante', label: 'Transplante',   color: '#16a34a' },
    { key: 'saca',        label: 'Saca de Arroz',  color: '#ca8a04' },
    { key: 'carga',       label: 'Carga',           color: '#2563eb' },
    { key: 'riego',       label: 'Riego',            color: '#0891b2' },
    { key: 'jornal',      label: 'Jornaleros',       color: '#7c3aed' },
    { key: 'por_saco',    label: 'Por Saco',         color: '#9333ea' },
  ];

  contenedor.innerHTML = segmentos.map(seg => {
    const grupo = filtrados.filter(t => t.tipoPago === seg.key);
    const filas = grupo.length === 0
      ? `<tr><td colspan="5" style="text-align:center;color:var(--ts);padding:14px;font-size:13px">Sin personal asignado</td></tr>`
      : grupo.map(t => `
          <tr>
            <td><div class="c-nombre"><div class="mini-av">${t.nombre[0]}</div><strong>${t.nombre} ${t.apellido}</strong></div></td>
            <td><code>${t.dni}</code></td>
            <td><span class="badge bp">${t.cargo}</span></td>
            <td style="text-align:right;font-size:12px;color:var(--v2);font-weight:700">S/${t.sueldoDia||t.pagoPorTarea||t.pagoPorSaco||'—'}</td>
            <td>
              <div class="acc-wrap"><button class="acc-btn" onclick="toggleMenu(this)">&#8943;</button><div class="acc-menu"><a onclick="verTrabajador(${t.id})">Ver detalle</a>${isAdmin() ? '<a onclick="abrirModalEditarTrabajador('+t.id+')">Editar</a><div class="acc-sep"></div><a class="rojo" onclick="eliminarTrabajador('+t.id+')">Dar de baja</a>' : ''}</div></div>
            </td>
          </tr>`).join('');

    return `
      <div class="card">
        <div class="card-hdr" style="border-left:4px solid ${seg.color};padding-left:12px">
          <h3 style="color:${seg.color};font-size:15px">${seg.label}</h3>
          <span style="background:${seg.color}22;color:${seg.color};font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">${grupo.length} persona${grupo.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="tabla-wrap">
          <table>
            <thead><tr><th>Trabajador</th><th>DNI</th><th>Cargo</th><th>Tarifa</th><th>Acciones</th></tr></thead>
            <tbody>${filas}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');
}

function filtrarTrabajadores(val){
  listarTrabajadores(val);
}

// ── Ver detalle completo del trabajador ──
function verTrabajador(id) {
  const t = trabajadores.find(w => w.id === id);
  if(!t) return;
  const asists = asistencias.filter(a => a.trabId === id);
  const totalSacos = asists.reduce((s,a)=>s+(a.sacos||0),0);
  const tipoPagoLabel = etiquetaTipoPago(t.tipoPago);
  const tarifa = t.sueldoDia ? `S/${t.sueldoDia}/día` :
                 t.pagoPorTarea ? `S/${t.pagoPorTarea}/tarea` :
                 t.pagoPorSaco ? `S/${t.pagoPorSaco}/saco` : '—';
  abrirModal(`
    <h3 class="modal-tit">${t.nombre} ${t.apellido}</h3>
    <div class="form-grid">
      <div class="fc"><label>DNI</label><p style="padding:9px 0;font-size:14px;font-weight:600">${t.dni}</p></div>
      <div class="fc"><label>Cargo</label><p style="padding:9px 0;font-size:14px">${t.cargo}</p></div>
      <div class="fc"><label>Tipo de Pago</label><span class="badge bb">${tipoPagoLabel}</span></div>
      <div class="fc"><label>Tarifa</label><p style="padding:9px 0;font-size:16px;font-weight:700;color:var(--v2)">${tarifa}</p></div>
      <div class="fc"><label>Asistencias totales</label><p style="padding:9px 0;font-size:14px">${asists.length} registros</p></div>
      <div class="fc"><label>Sacos totales</label><p style="padding:9px 0;font-size:14px">${totalSacos} sacos</p></div>
    </div>
    <div class="modal-foot">
      <button class="btn-s" onclick="cerrarModal()">Cerrar</button>
      ${isAdmin() ? '<button class="btn-p" onclick="cerrarModal();setTimeout(()=>abrirModalEditarTrabajador('+id+'),150)">Editar</button>' : ''}
    </div>
  `);
}

// ── Editar trabajador existente ──
async function abrirModalEditarTrabajador(id) {
  const t = trabajadores.find(w => w.id === id);
  if(!t) return;
  // Cargar cargos actuales
  let cargos = [];
  try { const r = await fetch('/api/trabajadores/cargos'); if(r.ok) cargos = await r.json(); } catch(e){}
  const opsCargo = cargos.map(c => `<option value="${c.idCargo}" ${c.idCargo === t.cargoId ? 'selected':''}}>${c.nomCargo}</option>`).join('');
  const tipoOps = ['jornal','por_saco','transplante','saca','carga','riego'].map(tp =>
    `<option value="${tp}" ${t.tipoPago===tp?'selected':''}>${etiquetaTipoPago(tp)}</option>`).join('');
  abrirModal(`
    <h3 class="modal-tit">Editar — ${t.nombre} ${t.apellido}</h3>
    <form id="form-editar-trab" onsubmit="guardarEdicionTrabajador(event,${id})">
      <div class="form-grid">
        <div class="fc"><label>Nombres</label><input type="text" id="et-nom" value="${t.nombre}" required></div>
        <div class="fc"><label>Apellidos</label><input type="text" id="et-ape" value="${t.apellido}" required></div>
        <div class="fc"><label>DNI</label><input type="text" maxlength="8" id="et-dni" value="${t.dni}" required></div>
        <div class="fc"><label>Tipo de Pago</label>
          <select id="et-pago" onchange="mostrarCampoPago(this.value)">${tipoOps}</select>
        </div>
        <div class="fc" id="campo-sueldo-dia-e" ${['jornal','tiempo'].includes(t.tipoPago)?'':'style="display:none"'}>
          <label>Sueldo por Día (S/)</label>

function listarVerificarTareas(){
  const container = document.getElementById('lista-verificar-tareas');
  if(!container) return;

  const fechaFiltro  = document.getElementById('filtro-fecha-vt')?.value || '';
  const sectorFiltro = document.getElementById('filtro-sector-vt')?.value || '';
  const estadoFiltro = document.getElementById('filtro-estado-vt')?.value || '';

  let filtradas = asistencias;
  if(fechaFiltro)  filtradas = filtradas.filter(a => a.fecAsist === fechaFiltro);
  if(sectorFiltro) filtradas = filtradas.filter(a => a.tipoTarea === sectorFiltro);
  if(estadoFiltro) filtradas = filtradas.filter(a => (a.estado||'PENDIENTE') === estadoFiltro);

  if(filtradas.length === 0){
    container.innerHTML = `<p style="padding:24px;color:var(--ts);text-align:center">No hay tareas para los filtros seleccionados.</p>`;
    return;
  }

  container.innerHTML = '';
  filtradas.forEach(a => {
    const trab = trabajadores.find(t => t.id === a.trabId) || {nombre:'Trabajador', apellido:'Externo'};
    const estado = a.estado || 'PENDIENTE';
    const tarifa = trab.sueldoDia || trab.pagoPorTarea || trab.pagoPorSaco || 0;
    const tareas = a.tareasCompletadas || 1;
    const pago   = tarifa * tareas;
    const colorEstado = estado==='APROBADO' ? 'bv' : estado==='OBSERVADO' ? 'br' : 'ba';
    const div = document.createElement('div');
    div.className = 'tv-row';
    div.id = `vt-row-${a.id}`;
    div.innerHTML = `
      <div class="tv-info">
        <div class="tv-name">${trab.nombre} ${trab.apellido}</div>
        <div class="tv-tarea">${labelTarea(a.tipoTarea)} · Entrada: ${formatHora(a.hora)} · Tareas: ${tareas} · ${a.observacion||'—'}</div>
      </div>
      <span class="badge ${colorEstado}" id="vt-estado-${a.id}">${estado}</span>
      <div class="tv-pago">S/${pago.toFixed(2)}</div>
      <div class="tv-acc">
        <button class="tbtn success" onclick="aprobarAsistencia(${a.id})" ${estado==='APROBADO'?'disabled':''}>Aprobar</button>
        <button class="tbtn peligro" onclick="observarAsistencia(${a.id})" ${estado==='OBSERVADO'?'disabled':''}>Observar</button>
        <button class="tbtn info" onclick="verAsistencia(${a.id})">Ver</button>
        <button class="tbtn" onclick="eliminarAsistencia(${a.id})">Eliminar</button>
      </div>
    `;
    container.appendChild(div);
  });
}

async function aprobarAsistencia(id) {
  const a = asistencias.find(x => x.id === id);
  if(!a) return;
  try {
    const r = await fetch(`/api/asistencias/${id}/aprobar`, {method:'PATCH'});
    if(r.ok || r.status === 404) {
      // Actualizar estado local aunque no haya endpoint específico
      a.estado = 'APROBADO';
      const badge = document.getElementById(`vt-estado-${id}`);
      if(badge){ badge.className='badge bv'; badge.textContent='APROBADO'; }
      // Persistir override local para mantener estado tras recarga
      saveAsistOverride(id, { estado: 'APROBADO', observacion: a.observacion || '' });
      mostrarToast('Asistencia aprobada para planilla');
    } else { mostrarToast('No se pudo actualizar'); }
  } catch(e) {
    // Actualizar localmente de todos modos
    a.estado = 'APROBADO';
    const badge = document.getElementById(`vt-estado-${id}`);
    if(badge){ badge.className='badge bv'; badge.textContent='APROBADO'; }
    saveAsistOverride(id, { estado: 'APROBADO', observacion: a.observacion || '' });
    mostrarToast('Marcado como aprobado (local)');
  }
}

async function observarAsistencia(id) {
  const motivo = prompt('Motivo de observación (opcional):') ?? '';
  const a = asistencias.find(x => x.id === id);
  if(!a) return;
  try {
    const r = await fetch(`/api/asistencias/${id}/observar`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({motivo})
    });
    a.estado = 'OBSERVADO';
    a.observacion = motivo || a.observacion;
    const badge = document.getElementById(`vt-estado-${id}`);
    if(badge){ badge.className='badge br'; badge.textContent='OBSERVADO'; }
    // Persistir override local
    saveAsistOverride(id, { estado: 'OBSERVADO', observacion: a.observacion || '' });
    mostrarToast('Observación enviada al capataz');
  } catch(e) {
    a.estado = 'OBSERVADO';
    const badge = document.getElementById(`vt-estado-${id}`);
    if(badge){ badge.className='badge br'; badge.textContent='OBSERVADO'; }
    saveAsistOverride(id, { estado: 'OBSERVADO', observacion: a.observacion || '' });
    mostrarToast('Observación registrada (local)');
  }
}

async function eliminarAsistencia(id){
  if(!confirm('¿Eliminar este registro de asistencia? Esta acción actualizará la vista local y (si está disponible) intentará eliminar en el servidor.')) return;
  // Persistir eliminación localmente primero para que sobreviva recargas
  saveAsistOverride(id, { deleted: true });
  try {
    const r = await fetch(`/api/asistencias/${id}`, { method: 'DELETE' });
    if(r.ok){
      // Si el servidor eliminó correctamente, limpiar override
      removeAsistOverride(id);
      asistencias = asistencias.filter(x => x.id !== id);
      const row = document.getElementById(`vt-row-${id}`);
      if(row) row.remove();
      mostrarToast('Registro eliminado');
      return;
    }
  } catch(e){ /* ignore network errors */ }
  // Fallback local delete (override ya guardado)
  asistencias = asistencias.filter(x => x.id !== id);
  const row = document.getElementById(`vt-row-${id}`);
  if(row) row.remove();
  mostrarToast('Registro eliminado (local)');
}

function labelTarea(k){
  return {TRANSPLANTE:'Transplante',SACA:'Saca de arroz',CARGA:'Carga',DIA:'Día',FUMIGACION:'Fumigación',ABONO:'Abono'}[k]||k;
}

function formatFecha(f){
  if(!f) return '–';
  const d=new Date(f+'T00:00:00');
  return d.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
}

function formatHora(h) {
  if (!h) return '—';
  const [hh, mm] = h.split(':');
  let hour = parseInt(hh);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  hour = hour % 12 || 12;
  return `${hour}:${mm} ${ampm}`;
}

function mostrarToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('vis');
  setTimeout(()=>t.classList.remove('vis'),3000);
}

    await verificarSesionServidor();
  } catch (e) {
    console.warn("Fallo en sesión del servidor, usando valores por defecto:", e);
  }

  try {
    // 2. Cargar tablas reales desde PostgreSQL

  } catch (e) {
    console.error("Fallo al conectar con las tablas de PostgreSQL:", e);
    mostrarToast("Cargando modo de contingencia local");
  }

  // 3. Forzar el despliegue del cascarón de la APP y arrancar vistas
  document.getElementById('pantalla-app').style.display = 'block';
  iniciarApp();
}

async function generarReporteRiego() {

  if(!desde||!hasta){mostrarToast('Seleccione las fechas');return;}
  const cont = document.getElementById('tabla-reporte-riego');
  cont.innerHTML = '<p style="color:var(--ts)">Cargando...</p>';
  const data = await apiFetch(`/api/reportes/riego?desde=${desde}&hasta=${hasta}`);
  if(!data){cont.innerHTML='<p style="color:red">Error al cargar.</p>';return;}
  if(!data.detalle||!data.detalle.length){
    cont.innerHTML='<p style="color:var(--ts)">Sin registros en ese período.</p>';return;

async function pagarPlanilla(id) {
  // Verificar estado actual de la planilla para evitar pagos duplicados
  try {
    const check = await fetch(`/api/planillas/${id}`);
    if(check.ok){
      const chk = await check.json();
      const estado = (chk.estado||'').toString().toUpperCase();
      if(estado === 'PAGADO' || estado === 'PAGADA'){
        mostrarToast('Esta planilla ya fue pagada previamente');
        return;
      }
    }
  } catch(e){ console.warn('No se pudo verificar estado de planilla antes de pagar',e); }

  if(!confirm('¿Confirmar pago de esta planilla?')) return;
  try {
    const r = await fetch(`/api/planillas/${id}/pagar`, {method:'PATCH'});
    if(r.ok){
      mostrarToast('Planilla marcada como PAGADA');
      // Actualizar estado y botón en el DOM
      const btn = document.querySelector(`[onclick="pagarPlanilla(${id})"]`);
      const statusStrong = btn?.closest('div')?.querySelector('strong');
      if(statusStrong) statusStrong.textContent = 'PAGADO';
      // Intentar leer monto y trabajador desde el DOM; si falla, intentar fetch de la planilla
      let monto = 0;
      let desc = `Pago planilla ${id}`;
      try {
        if(btn){
          const parent = btn.closest('div')?.parentElement;
          const display = parent?.querySelector('.pago-display');
          if(display){
            const montoTxt = display.querySelector('.pago-num')?.textContent || '';
            const mclean = montoTxt.replace(/[^0-9.,-]/g, '').replace(',', '.');
            monto = parseFloat(mclean) || 0;
            const info = display.querySelector('div')?.textContent || '';
            const nombre = info.split('·')[0]?.trim();
            if(nombre) desc = `Pago planilla ${id} · ${nombre}`;
          } else {
            const pd = await fetch(`/api/planillas/${id}`);
            if(pd.ok){
              const pdj = await pd.json();
              monto = parseFloat(pdj.montoTotal || 0);
              if(pdj.trabajador) desc = `Pago planilla ${id} · ${pdj.trabajador.nomTrab || pdj.trabajador.nombre || ''} ${pdj.trabajador.apeTrab || pdj.trabajador.apellido || ''}`.trim();
            }
          }
        }
      } catch(e) {
        console.warn('No se pudo obtener monto/descripcion de planilla:', e);
      }

      if(btn){ btn.outerHTML = `<span class="badge bv" style="font-size:13px;padding:6px 14px">Planilla pagada</span>`; }

      // Registrar movimiento en caja (EGRESO) en backend
      try {
        const cajaBody = { tipo: 'EGRESO', desc: desc, monto: monto, fecha: new Date().toISOString().slice(0,10), ico: '' };
        const rc = await fetch('/api/caja', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cajaBody)});
        if(rc && rc.ok){
          const saved = await rc.json();
          movCaja.unshift(saved);
          listarCaja();
        } else {
          // si falla, mantener registro local como fallback
          movCaja.unshift({ id: movCaja.length+1, tipo:'EGRESO', desc, monto, fecha: new Date().toISOString().slice(0,10), ico:'' });
          listarCaja();
        }
      } catch(e){
        console.warn('No se pudo guardar movimiento en servidor, guardando localmente', e);
        movCaja.unshift({ id: movCaja.length+1, tipo:'EGRESO', desc, monto, fecha: new Date().toISOString().slice(0,10), ico:'' });
        listarCaja();
      }
    } else { mostrarToast('No se pudo marcar como pagada'); }
  } catch(e){ mostrarToast('Sin conexión'); }
}

function filtrarAbonos() {
  const txtTrab = document.getElementById('filtro-ab-trab')?.value.toLowerCase() || '';
  const mes     = document.getElementById('filtro-ab-mes')?.value || '';   // "2026-05"
  const tipo    = document.getElementById('filtro-ab-tipo')?.value || '';
  let data = abonosCargados;
  if(txtTrab) data = data.filter(a => (`${a.trabajador?.nombre||''} ${a.trabajador?.apellido||''}`).toLowerCase().includes(txtTrab));
  if(mes)     data = data.filter(a => (a.fecha||'').startsWith(mes));
  if(tipo)    data = data.filter(a => a.tipoSaco === tipo);
  renderTablaAbonos(data);
}

  const totalSacos = data.reduce((s,a)=>s+(a.cantidadSacos||0),0);

let gasolinaCargada = [];

async function cargarGasolina(){
  const tbody = document.getElementById('lista-gasolina');
  if(!tbody) return;
  try{
    const r = await fetch('/api/gasolina');
    if(!r.ok) throw new Error();
    gasolinaCargada = await r.json();
    renderTablaGasolina(gasolinaCargada);
  }catch(e){
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--ts);padding:24px">Error al cargar registros.</td></tr>`;
  }
}

function filtrarGasolina() {
  const tipo  = document.getElementById('filtro-gas-tipo')?.value || '';
  const desde = document.getElementById('filtro-gas-desde')?.value || '';
  const hasta = document.getElementById('filtro-gas-hasta')?.value || '';
  let data = gasolinaCargada;
  if(tipo)  data = data.filter(g => g.tipoUso === tipo);
  if(desde) data = data.filter(g => (g.fecha||'') >= desde);
  if(hasta) data = data.filter(g => (g.fecha||'') <= hasta);
  renderTablaGasolina(data);
}

function renderTablaGasolina(data) {
  const tbody   = document.getElementById('lista-gasolina');
  const totalEl = document.getElementById('total-gas-litros');
  const rt      = document.getElementById('resumen-transporte');
  const rf      = document.getElementById('resumen-fumigacion');
  if(!tbody) return;

  const lt = (tipo) => data.filter(g=>g.tipoUso===tipo).reduce((a,c)=>a+(parseFloat(c.litros)||0),0).toFixed(1);
  if(rt) rt.textContent = lt('TRANSPORTE_PERSONAL') + ' L';
  if(rf) rf.textContent = lt('FUMIGACION') + ' L';
  const totalL = data.reduce((s,g)=>s+(parseFloat(g.litros)||0),0);
  if(totalEl) totalEl.textContent = totalL.toFixed(1) + ' L';

  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:var(--ts);padding:24px">No hay registros con esos filtros.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(g=>`<tr>
    <td>${g.fecha||'—'}</td>
    <td>${g.tipoUso==='FUMIGACION'?'Fumigación':'Transporte'}</td>
    <td>${g.vehiculo||g.maquinaFumigacion||'—'}</td>
    <td style="font-weight:700;text-align:center">${g.litros||0} L</td>
    <td>${g.parcela||'—'}</td>
    <td>${g.responsable||'—'}</td>
    <td><div class="acc-wrap"><button class="acc-btn" onclick="toggleMenu(this)">&#8943;</button><div class="acc-menu">${isAdmin() ? '<a onclick="abrirModalEditarGasolina('+(g.idGasolina||g.id)+')">Editar</a><div class="acc-sep"></div><a class="rojo" onclick="eliminarGasolina('+(g.idGasolina||g.id)+')">Eliminar</a>' : ''}</div></div></td>
  </tr>`).join('');
}

async function cargarLabores(tipoTarea, seccionId) {
  const tbody = document.getElementById('lista-labor-' + seccionId);
  const totalEl = document.getElementById('total-labor-' + seccionId);
  if(!tbody) return;
  try {
    // El backend ya filtra por tipoTarea gracias al @RequestParam
    const data = await apiFetch(`/api/asistencias?tipoTarea=${tipoTarea}`);
    if(!data || !data.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--ts);padding:18px;font-size:13px">Sin registros aún.</td></tr>`;
      if(totalEl) totalEl.textContent = 'S/0.00';
      return;
    }
    let totalAcum = 0;
    tbody.innerHTML = data.map(a => {
      // Datos del trabajador vienen embebidos en la respuesta de asistencia
      const trabObj  = a.trabajador || {};
      const nomTrab  = trabObj.nomTrab  || '—';
      const apeTrab  = trabObj.apeTrab  || '';
      const inicial  = nomTrab[0] || '?';
      const tareas   = a.tareasCompletadas || 0;
      const pago     = parseFloat(trabObj.pagoPorTarea || 0);
      const subtotal = tareas * pago;
      totalAcum += subtotal;
      return `<tr>
        <td>${a.fecAsist || '—'}</td>
        <td><div class="c-nombre"><div class="mini-av">${inicial}</div><strong>${nomTrab} ${apeTrab}</strong></div></td>
        <td>${a.observacionSupervisor || '—'}</td>
        <td style="text-align:center;font-weight:700">${tareas}</td>
        <td style="text-align:right">S/${pago.toFixed(2)}</td>
      <td style="text-align:right;color:var(--v2);font-weight:700">S/${subtotal.toFixed(2)}</td>
      </tr>`;
    }).join('');
    if(totalEl) totalEl.textContent = 'S/' + totalAcum.toFixed(2);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:red;padding:18px">Error al cargar.</td></tr>`;
  }
}

async function cargarPersonalSeccion(tipoPago, seccionId) {
  const data = await apiFetch(`/api/trabajadores/tipo/${tipoPago}`);
  if (!data) return;

  // Caso riego: actualiza el card de Trabajadores de Riego
  if (seccionId === 'riego') {
    const cards = document.querySelectorAll('.card');
    let riegoCard = null;
    for (const c of cards) {
      if (c.querySelector('h3')?.textContent.includes('Trabajadores de Riego')) { riegoCard = c; break; }
    }
    if (riegoCard) {
      const body = riegoCard.querySelector('div[style*="padding"]');
      if (body) {
        body.innerHTML = data.length === 0
          ? '<p style="color:var(--ts);font-size:13px">Ningún trabajador asignado a riego aún.</p>'
          : data.map(t => `
              <div class="dato-fila">
                <span>${t.nomTrab} ${t.apeTrab}</span>
                <span class="val">S/${t.pagoPorTarea||'—'} / tarea</span>
              </div>`).join('');
      }
    }
    return;
  }

  // Para transplante, saca-arroz, carga-arroz: busca la primera tabla de personal
  const modId = seccionId === 'transplante' ? 'transplante' : seccionId === 'saca' ? 'saca-arroz' : 'carga-arroz';
  const mod = document.getElementById(`mod-${modId}`);
  if (!mod) return;
  const tablas = mod.querySelectorAll('table');
  const tbody = tablas[0]?.querySelector('tbody');
  const countEl = mod.querySelector('.card-hdr span[style*="color"]');

  if (!tbody) return;
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--ts);padding:14px;font-size:13px">Sin personal asignado a esta sección.</td></tr>';
  } else {
    tbody.innerHTML = data.map(t => `
      <tr>
        <td><div class="c-nombre"><div class="mini-av">${t.nomTrab[0]}</div><strong>${t.nomTrab} ${t.apeTrab}</strong></div></td>
        <td><code>${t.dniTrab}</code></td>
        <td><span class="badge bp">${t.cargoNombre || 'Sin cargo'}</span></td>
      </tr>`).join('');
  }
  if (countEl) countEl.textContent = `${data.length} persona${data.length !== 1 ? 's' : ''}`;
}

function calcularPagoLabor() {
  const sel = document.getElementById('lab-trab');
  const tareas = parseInt(document.getElementById('lab-tareas')?.value) || 0;
  const display = document.getElementById('lab-pago-display');
  if(!sel || !display) return;
  // Lee el pago desde data-pago del option seleccionado (viene del backend filtrado)
  const selectedOption = sel.options[sel.selectedIndex];
  const pagoPorTarea = parseFloat(selectedOption?.dataset?.pago || 0);
  const pago = pagoPorTarea * tareas;
  display.textContent = 'S/' + pago.toFixed(2);
}

async function guardarLabor(tipoTarea, tipoPago) {
  const idTrab  = document.getElementById('lab-trab')?.value;
  const fecha   = document.getElementById('lab-fecha')?.value;
  const tareas  = parseInt(document.getElementById('lab-tareas')?.value) || 0;
  const parcela = document.getElementById('lab-parcela')?.value;
  const obs     = document.getElementById('lab-obs')?.value;
  if(!idTrab || !fecha) { mostrarToast('Complete los campos obligatorios'); return; }
  const body = {
    trabajador: { idTrab: parseInt(idTrab) },
    fecAsist: fecha,
    presente: true,
    tipoTarea: tipoTarea,
    tareasCompletadas: tareas,
    observacionSupervisor: parcela + (obs ? ' — ' + obs : '')
  };
  try {
    const r = await fetch('/api/asistencias', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(r.ok) {
      mostrarToast('Labor registrada correctamente');
      cerrarModal();
      await cargarDatosIniciales();
      const seccionId = {TRANSPLANTE:'transplante', SACA:'saca-arroz', CARGA:'carga-arroz'}[tipoTarea];
      cargarLabores(tipoTarea, seccionId);
    } else mostrarToast('Error al registrar');
  } catch(e) { mostrarToast('Sin conexión'); }
}

              <td style="padding:9px 12px;font-size:13px">${a.fecAsist||'—'}</td>
              <td style="padding:9px 12px"><div class="c-nombre"><div class="mini-av">${(trab.nombre||'?')[0]}</div><strong>${trab.nombre||'—'} ${trab.apellido||''}</strong></div></td>
              <td style="padding:9px 12px;text-align:center;font-weight:700;color:var(--v2)">${a.tareasCompletadas||0}</td>
              <td style="padding:9px 12px;font-size:12px;color:var(--ts)">${a.observacionSupervisor||'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="padding:10px 16px;text-align:right;font-size:13px;color:var(--ts);border-top:1px solid var(--borde)">
        Total tareas: <strong style="color:var(--v2)">${totalTareas}</strong>
      </div>`;
  } catch(e) {
    const lista = document.getElementById('lista-riego-hoy');
    if(lista) lista.innerHTML = `<p style="color:red;padding:12px;font-size:13px">Error al cargar riegos.</p>`;
  }
}

</script>
</body>
</html>
