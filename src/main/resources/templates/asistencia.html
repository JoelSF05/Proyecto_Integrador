<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistencia - Sistema Arroz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            color: #2e7d32;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 150px;
            font-weight: bold;
        }
        input, select {
            padding: 8px;
            width: 200px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        .btn-volver {
            background-color: #666;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
        }
        .mensaje {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: none;
        }
        .mensaje-exito {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .mensaje-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Control de Asistencia</h1>
        
        <div id="mensaje" class="mensaje"></div>
        
        <div class="form-group">
            <label>Trabajador:</label>
            <select id="idTrab">
                <option value="">Seleccionar...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Fecha:</label>
            <input type="date" id="fecAsist">
        </div>
        <div class="form-group">
            <label>Hora Entrada:</label>
            <input type="time" id="horaEntrada">
        </div>
        <div class="form-group">
            <label>Hora Salida:</label>
            <input type="time" id="horaSalida">
        </div>
        <div class="form-group">
            <label>Sacos Cosechados:</label>
            <input type="number" id="sacosCosechados" value="0" min="0">
        </div>
        <div class="form-group">
            <label>Presente:</label>
            <select id="presente">
                <option value="true">Sí</option>
                <option value="false">No</option>
            </select>
        </div>
        
        <button onclick="guardarAsistencia()">💾 Guardar</button>
        <button onclick="cargarAsistencias()">🔄 Actualizar</button>
        
        <h2>Registros de Asistencia</h2>
<table id="tablaAsistencias" border="1" style="width:100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th>ID</th>
            <th>Trabajador</th>
            <th>Fecha</th>
            <th>Hora Entrada</th>
            <th>Hora Salida</th>
            <th>Estado</th>
            <th>Sacos</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody id="tabla-body">
        <tr><td colspan="8">Cargando...</td></tr>
    </tbody>
</table>
        
        <a href="/" class="btn-volver">← Volver al Inicio</a>
    </div>

    <script>
        // Cargar trabajadores al iniciar
        fetch('/api/trabajadores')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('idTrab');
                data.forEach(t => {
                    select.innerHTML += `<option value="${t.idTrab}">${t.nomTrab} ${t.apeTrab} (ID: ${t.idTrab})</option>`;
                });
            })
            .catch(error => {
                mostrarMensaje('Error al cargar trabajadores: ' + error.message, 'error');
            });
        
        // Cargar asistencias
        function cargarAsistencias() {
    fetch('/api/asistencias')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8">No hay registros de asistencia</td></tr>';
                return;
            }
            
            data.forEach(a => {
                const estado = a.presente ? 'Presente' : 'Ausente';
                const nombreTrabajador = a.trabajador ? `${a.trabajador.nomTrab} ${a.trabajador.apeTrab}` : 'ID: ' + (a.idTrab || '-');
                
                // Formatear fecha correctamente
                let fechaMostrar = '-';
                if (a.fecAsist) {
                    fechaMostrar = a.fecAsist;
                }
                
                const row = `
                    <tr>
                        <td>${a.idAsist}</td>
                        <td>${nombreTrabajador}</td>
                        <td>${fechaMostrar}</td>
                        <td>${a.horaEntrada || '-'}</td>
                        <td>${a.horaSalida || '-'}</td>
                        <td>${estado}</td>
                        <td>${a.sacosCosechados || 0}</td>
                        <td><button onclick="eliminarAsistencia(${a.idAsist})" style="background:#f44336;color:white;border:none;padding:5px 10px;cursor:pointer;">Eliminar</button></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('tabla-body').innerHTML = '<tr><td colspan="8">Error al cargar</td></tr>';
        });
}
        
        // Guardar asistencia
        function guardarAsistencia() {
            const idTrab = document.getElementById('idTrab').value;
            const fecAsist = document.getElementById('fecAsist').value;
            const horaEntrada = document.getElementById('horaEntrada').value;
            const horaSalida = document.getElementById('horaSalida').value;
            const sacosCosechados = document.getElementById('sacosCosechados').value;
            const presente = document.getElementById('presente').value === 'true';
            
            // Validaciones
            if (!idTrab) {
                mostrarMensaje('❌ Seleccione un trabajador', 'error');
                return;
            }
            
            if (!fecAsist) {
                mostrarMensaje('❌ Seleccione una fecha', 'error');
                return;
            }
            
            const asistencia = {
                trabajador: { idTrab: parseInt(idTrab) },
                fecAsist: fecAsist,
                horaEntrada: horaEntrada || null,
                horaSalida: horaSalida || null,
                presente: presente,
                sacosCosechados: parseInt(sacosCosechados) || 0
            };
            
            console.log('Enviando:', asistencia);
            
            fetch('/api/asistencias', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(asistencia)
            })
            .then(res => {
                console.log('Respuesta status:', res.status);
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                console.log('Respuesta:', data);
                mostrarMensaje('✅ Asistencia guardada correctamente', 'exito');
                // Limpiar formulario
                document.getElementById('idTrab').value = '';
                document.getElementById('fecAsist').value = '';
                document.getElementById('horaEntrada').value = '';
                document.getElementById('horaSalida').value = '';
                document.getElementById('sacosCosechados').value = '0';
                // Recargar tabla
                cargarAsistencias();
            })
            .catch(error => {
                console.error('Error:', error);
                mostrarMensaje('❌ Error al guardar: ' + error.message, 'error');
            });
        }
        
        // Eliminar asistencia
        function eliminarAsistencia(id) {
            if (confirm('¿Eliminar este registro de asistencia?')) {
                fetch(`/api/asistencias/${id}`, { method: 'DELETE' })
                    .then(() => {
                        mostrarMensaje('✅ Registro eliminado', 'exito');
                        cargarAsistencias();
                    })
                    .catch(error => {
                        mostrarMensaje('❌ Error al eliminar: ' + error.message, 'error');
                    });
            }
        }
        
        function mostrarMensaje(texto, tipo) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.textContent = texto;
            mensajeDiv.className = `mensaje mensaje-${tipo}`;
            mensajeDiv.style.display = 'block';
            setTimeout(() => {
                mensajeDiv.style.display = 'none';
            }, 3000);
        }
        
        // Cargar asistencias al iniciar
        cargarAsistencias();
    </script>
</body>
</html>
