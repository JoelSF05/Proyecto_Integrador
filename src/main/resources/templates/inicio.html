<div>
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Trabajadores</h3>
            <div class="number" id="totalTrabajadores">0</div>
        </div>
        <div class="stat-card">
            <h3>Asistencias Hoy</h3>
            <div class="number" id="asistenciasHoy">0</div>
        </div>
        <div class="stat-card">
            <h3>Sacos Cosechados</h3>
            <div class="number" id="totalSacos">0</div>
        </div>
        <div class="stat-card">
            <h3>Hectáreas</h3>
            <div class="number" id="totalHectareas">3</div>
        </div>
    </div>
    
    <div style="background: white; border-radius: 10px; padding: 20px; margin-top: 20px;">
        <h3>📋 Últimas Asistencias</h3>
        <table style="width:100%; border-collapse: collapse; margin-top: 15px;">
            <thead><tr><th>Fecha</th><th>Trabajador</th><th>Entrada</th><th>Salida</th><th>Sacos</th></tr></thead>
            <tbody id="ultimasAsistencias"></tbody>
        </table>
    </div>
</div>

<script>
fetch('/api/trabajadores').then(res => res.json()).then(data => {
    document.getElementById('totalTrabajadores').innerText = data.length.toLocaleString('es-PE');
});
fetch('/api/asistencias').then(res => res.json()).then(data => {
    const activeData = data.filter(a => a.trabajador && a.trabajador.activo);
    const totalSacos = activeData.reduce((sum, a) => sum + (parseInt(a.sacosCosechados) || 0), 0);
    document.getElementById('totalSacos').innerText = totalSacos.toLocaleString('es-PE');
    const tbody = document.getElementById('ultimasAsistencias');
    tbody.innerHTML = '';
    activeData.slice(-5).reverse().forEach(a => {
        const nombre = a.trabajador ? `${a.trabajador.nomTrab} ${a.trabajador.apeTrab}` : '-';
        const formatUTC = (h) => {
            if(!h || !a.fecAsist) return '-';
            const [hh, mm] = Array.isArray(h) ? [h[0], h[1]] : h.split(':');
            const d = new Date(`${a.fecAsist}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00Z`);
            return d.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:true});
        };
        const formatFechaUTC = (f, h) => {
            if(!f || !h) return f || '-';
            const [hh, mm] = Array.isArray(h) ? [h[0], h[1]] : h.split(':');
            const d = new Date(`${f}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00Z`);
            return d.toLocaleDateString('es-PE', {day:'2-digit', month:'short', year:'numeric'});
        };

        tbody.innerHTML += `<tr><td>${a.fecAsist || '-'}</td><td>${nombre}</td><td>${a.horaEntrada || '-'}</td><td>${a.horaSalida || '-'}</td><td>${a.sacosCosechados || 0}</td></tr>`;
        tbody.innerHTML += `<tr><td>${formatFechaUTC(a.fecAsist, a.horaEntrada)}</td><td>${nombre}</td><td>${formatUTC(a.horaEntrada)}</td><td>${formatUTC(a.horaSalida)}</td><td>${a.sacosCosechados || 0}</td></tr>`;
    });
});
</script>
